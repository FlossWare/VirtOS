# VirtOS Profile: Standard (default)
# Balanced for home lab (~200MB)
# KVM, Docker, LXC, libvirt, common tools

# Virtualization
INCLUDE_KVM="yes"
INCLUDE_LXC="yes"
INCLUDE_DOCKER="yes"
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="no"

# Management
INCLUDE_LIBVIRT="yes"
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

# Networking
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

# Storage
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

# Utilities
INCLUDE_BASH="yes"
INCLUDE_VIM="yes"
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"
INCLUDE_DIALOG="yes"
INCLUDE_NCURSES="yes"

# Clustering
ENABLE_CLUSTERING="yes"
INCLUDE_AVAHI="yes"

# Kubernetes
INCLUDE_K3S="no"

# IaaS
ENABLE_IAAS="yes"
