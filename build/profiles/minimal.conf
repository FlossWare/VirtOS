# VirtOS Profile: Minimal
# Smallest possible system (~100MB)
# KVM only, no containers, basic networking
# Uses busybox tools where possible (vi instead of vim, top instead of htop)

# Virtualization
INCLUDE_KVM="yes"         # Core VM functionality
INCLUDE_LXC="no"          # Not needed for VM-only (saves ~5-10MB)
INCLUDE_DOCKER="no"       # Not needed for VM-only
INCLUDE_CONTAINERD="no"   # Not needed for VM-only
INCLUDE_PODMAN="no"       # Not needed for VM-only

# Management
INCLUDE_LIBVIRT="yes"
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

# Networking
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

# Storage
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

# Utilities
INCLUDE_BASH="yes"        # Required for virtos-tools scripts
INCLUDE_VIM="no"          # Use busybox vi (saves ~5-8MB)
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="no"         # Use busybox top (saves ~1-2MB)
INCLUDE_CURL="yes"
INCLUDE_WGET="no"
INCLUDE_DIALOG="yes"      # Required for virtos-tui
INCLUDE_NCURSES="yes"     # Required by dialog

# Clustering
ENABLE_CLUSTERING="no"
INCLUDE_AVAHI="no"

# Kubernetes
INCLUDE_K3S="no"

# IaaS
ENABLE_IAAS="no"
