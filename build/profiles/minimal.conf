# VirtOS Profile: Minimal
# Smallest possible system (~100MB)
# KVM only, no containers, basic networking

# Virtualization
INCLUDE_KVM="yes"
INCLUDE_LXC="no"
INCLUDE_DOCKER="no"
INCLUDE_CONTAINERD="no"
INCLUDE_PODMAN="no"

# Management
INCLUDE_LIBVIRT="yes"
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

# Networking
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

# Storage
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

# Utilities
INCLUDE_BASH="no"
INCLUDE_VIM="no"
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="no"
INCLUDE_CURL="yes"
INCLUDE_WGET="no"
INCLUDE_DIALOG="yes"
INCLUDE_NCURSES="yes"

# Clustering
ENABLE_CLUSTERING="no"
INCLUDE_AVAHI="no"

# Kubernetes
INCLUDE_K3S="no"

# IaaS
ENABLE_IAAS="no"
