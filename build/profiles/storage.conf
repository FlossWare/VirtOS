# VirtOS Profile: Storage
# Advanced storage features (~350MB, 4GB+ RAM recommended)
# Btrfs, LVM, ZFS, NFS, KVM, containerd, all storage tools

# Virtualization
INCLUDE_KVM="yes"
INCLUDE_LXC="yes"
INCLUDE_DOCKER="no"
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="no"

# Management
INCLUDE_LIBVIRT="yes"
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

# Networking
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

# Storage
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="yes"
INCLUDE_ZFS="yes"
INCLUDE_BTRFS="yes"

# Utilities
INCLUDE_BASH="yes"
INCLUDE_VIM="yes"
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"
INCLUDE_DIALOG="yes"
INCLUDE_NCURSES="yes"

# Clustering
ENABLE_CLUSTERING="yes"
INCLUDE_AVAHI="yes"

# Kubernetes
INCLUDE_K3S="no"

# IaaS
ENABLE_IAAS="yes"
