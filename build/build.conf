# FlossWare VirtOS - Build Configuration
# Edit this file to customize your build

#==============================================================================
# BASE SYSTEM
#==============================================================================

# Tiny Core version (check http://tinycorelinux.net for available versions)
TC_VERSION="15.x"
TC_ARCH="x86_64"

# ISO Label and version
ISO_LABEL="VirtOS"
FW_VERSION="0.1-alpha"

#==============================================================================
# VIRTUALIZATION COMPONENTS (yes/no)
#==============================================================================

# KVM/QEMU - Full hardware virtualization
INCLUDE_KVM="yes"

# LXC - System containers
INCLUDE_LXC="yes"

# Container Runtimes - Choose one or more (yes/no for each)
INCLUDE_DOCKER="yes"
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="yes"

#==============================================================================
# MANAGEMENT TOOLS (yes/no)
#==============================================================================

# libvirt - Unified virtualization API
INCLUDE_LIBVIRT="yes"

# Command-line tools
INCLUDE_VIRSH="yes"      # libvirt CLI (requires INCLUDE_LIBVIRT=yes)

# Web interfaces (future)
INCLUDE_COCKPIT="no"     # Web-based system management
INCLUDE_PORTAINER="no"   # Container management UI

#==============================================================================
# NETWORKING (yes/no)
#==============================================================================

# Basic networking (always recommended)
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"

# Advanced networking
INCLUDE_OVS="no"         # Open vSwitch
INCLUDE_WIREGUARD="no"   # VPN support

#==============================================================================
# STORAGE (yes/no)
#==============================================================================

# Basic storage tools (always recommended)
INCLUDE_QEMU_IMG="yes"

# Advanced storage
INCLUDE_LVM="no"         # Logical Volume Manager
INCLUDE_ZFS="no"         # ZFS filesystem
INCLUDE_BTRFS="no"       # Btrfs filesystem

#==============================================================================
# SYSTEM UTILITIES (yes/no)
#==============================================================================

# Shells
INCLUDE_BASH="yes"       # Bash shell (default is busybox ash)

# Editors
INCLUDE_VIM="yes"
INCLUDE_NANO="no"

# Remote access
INCLUDE_OPENSSH="yes"

# Monitoring
INCLUDE_HTOP="yes"

# Network utilities
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"

# Text UI (ncurses)
INCLUDE_DIALOG="yes"     # dialog/whiptail for TUI (virtos-tui)
INCLUDE_NCURSES="yes"    # ncurses library for TUI apps

#==============================================================================
# PROFILES - Quick configurations (uncomment ONE to use)
#==============================================================================
# These override individual settings above

# Minimal - Smallest possible system (~100MB)
# PROFILE="minimal"
# - KVM only, no containers, basic networking

# Standard - Balanced for home lab (default, ~200MB)
PROFILE="standard"
# - KVM, Docker, LXC, libvirt, common tools

# Full - Everything included (~400MB)
# PROFILE="full"
# - All virtualization types, all tools, all utilities

# Container-focused - For container workloads (~150MB)
# PROFILE="containers"
# - Docker, Podman, containerd, minimal VM support

# Developer - Dev-friendly setup (~250MB)
# PROFILE="developer"
# - All container runtimes, KVM, dev tools, bash, vim

# Storage - Advanced storage features (~350MB, 4GB+ RAM recommended)
# PROFILE="storage"
# - Btrfs, LVM, ZFS, NFS, KVM, containerd, all storage tools

#==============================================================================
# BOOT OPTIONS
#==============================================================================

# Auto-start services at boot (yes/no)
AUTOSTART_NETWORKING="yes"
AUTOSTART_KVM="yes"
AUTOSTART_DOCKER="no"        # Load but don't start daemon
AUTOSTART_LIBVIRT="yes"      # Enable for remote virt-manager access

# Boot parameters
BOOT_TIMEOUT="5"             # Seconds before auto-boot
ENABLE_SERIAL_CONSOLE="no"   # Enable serial console access

#==============================================================================
# CUSTOMIZATION
#==============================================================================

# Custom hostname
HOSTNAME="virtos"

# Custom scripts directory (optional)
# Place custom scripts in config/custom-scripts/
# They will be copied to /usr/local/bin/
INCLUDE_CUSTOM_SCRIPTS="yes"

# Additional kernel modules to load
# Space-separated list
EXTRA_MODULES=""

# Additional kernel boot parameters
EXTRA_BOOT_PARAMS=""

#==============================================================================
# CLUSTERING (yes/no)
#==============================================================================

# Enable cluster discovery and coordination
ENABLE_CLUSTERING="yes"

# Service discovery (for .local hostname resolution)
INCLUDE_AVAHI="yes"          # mDNS/Avahi for automatic discovery

# Cluster name (all hosts in same cluster must match)
CLUSTER_NAME="homelab"

# Advanced clustering features (future)
CLUSTER_SHARED_STORAGE="no"  # NFS/Ceph support
CLUSTER_VM_MIGRATION="no"    # Live migration (requires shared storage)
CLUSTER_HA="no"              # High availability/failover

#==============================================================================
# KUBERNETES (yes/no)
#==============================================================================

# Enable Kubernetes (K3s) support
INCLUDE_K3S="no"             # Lightweight Kubernetes

# K3s configuration
K3S_VERSION="latest"         # or specific version like "v1.28.5+k3s1"
K3S_ROLE="server"            # server, agent, both (for build defaults)
AUTOSTART_K3S="no"           # Auto-start at boot

# K3s components (optional customization)
K3S_DISABLE_TRAEFIK="no"     # Disable built-in Traefik ingress
K3S_DISABLE_SERVICELB="no"   # Disable built-in service load balancer

#==============================================================================
# IAAS / AUTOMATED PLACEMENT (yes/no)
#==============================================================================

# Enable IaaS features (automated VM placement)
ENABLE_IAAS="yes"

# Default scheduler policy
IAAS_SCHEDULER="balanced"    # balanced, packed, spread, custom

# Resource tracking
IAAS_REFRESH_INTERVAL="30"   # Seconds between resource updates

# Resource management
IAAS_CPU_OVERCOMMIT="1.0"    # CPU overcommit ratio (1.0 = no overcommit)
IAAS_RAM_OVERCOMMIT="1.0"    # RAM overcommit ratio
IAAS_MIN_FREE_RAM_MB="1024"  # Reserve RAM per host

# Placement options
IAAS_AVOID_SINGLE_NODE="yes" # Warn if all VMs on one node

#==============================================================================
# BUILD OPTIONS
#==============================================================================

# Compression level (1-9, higher = smaller but slower)
COMPRESSION_LEVEL="9"

# Create USB-bootable hybrid ISO
CREATE_HYBRID_ISO="yes"

# Generate checksums (MD5, SHA256)
GENERATE_CHECKSUMS="yes"

# Clean workspace after build
CLEAN_AFTER_BUILD="no"
