# FlossWare VirtOS - Build Configuration
# Edit this file to customize your build

#==============================================================================
# BASE SYSTEM
#==============================================================================

# Tiny Core version (check http://tinycorelinux.net for available versions)
TC_VERSION="15.x"
TC_ARCH="x86_64"

# ISO Label and version
ISO_LABEL="VirtOS"
FW_VERSION="0.1-alpha"

#==============================================================================
# VIRTUALIZATION COMPONENTS (yes/no)
#==============================================================================

# KVM/QEMU - Full hardware virtualization
INCLUDE_KVM="yes"

# LXC - System containers
INCLUDE_LXC="yes"

# Container Runtimes - Choose one or more (yes/no for each)
INCLUDE_DOCKER="yes"
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="yes"

#==============================================================================
# MANAGEMENT TOOLS (yes/no)
#==============================================================================

# libvirt - Unified virtualization API
INCLUDE_LIBVIRT="yes"

# Command-line tools
INCLUDE_VIRSH="yes"      # libvirt CLI (requires INCLUDE_LIBVIRT=yes)

# Web interfaces (future)
INCLUDE_COCKPIT="no"     # Web-based system management
INCLUDE_PORTAINER="no"   # Container management UI

#==============================================================================
# NETWORKING (yes/no)
#==============================================================================

# Basic networking (always recommended)
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"

# Advanced networking
INCLUDE_OVS="no"         # Open vSwitch
INCLUDE_WIREGUARD="no"   # VPN support

#==============================================================================
# STORAGE (yes/no)
#==============================================================================

# Basic storage tools (always recommended)
INCLUDE_QEMU_IMG="yes"

# Advanced storage
INCLUDE_LVM="no"         # Logical Volume Manager
INCLUDE_ZFS="no"         # ZFS filesystem
INCLUDE_BTRFS="no"       # Btrfs filesystem

#==============================================================================
# SYSTEM UTILITIES (yes/no)
#==============================================================================

# Shells
INCLUDE_BASH="yes"       # Bash shell (default is busybox ash)

# Editors
INCLUDE_VIM="yes"
INCLUDE_NANO="no"

# Remote access
INCLUDE_OPENSSH="yes"

# Monitoring
INCLUDE_HTOP="yes"

# Network utilities
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"

#==============================================================================
# PROFILES - Quick configurations (uncomment ONE to use)
#==============================================================================
# These override individual settings above

# Minimal - Smallest possible system (~100MB)
# PROFILE="minimal"
# - KVM only, no containers, basic networking

# Standard - Balanced for home lab (default, ~200MB)
PROFILE="standard"
# - KVM, Docker, LXC, libvirt, common tools

# Full - Everything included (~400MB)
# PROFILE="full"
# - All virtualization types, all tools, all utilities

# Container-focused - For container workloads (~150MB)
# PROFILE="containers"
# - Docker, Podman, containerd, minimal VM support

# Developer - Dev-friendly setup (~250MB)
# PROFILE="developer"
# - All container runtimes, KVM, dev tools, bash, vim

#==============================================================================
# BOOT OPTIONS
#==============================================================================

# Auto-start services at boot (yes/no)
AUTOSTART_NETWORKING="yes"
AUTOSTART_KVM="yes"
AUTOSTART_DOCKER="no"        # Load but don't start daemon
AUTOSTART_LIBVIRT="no"       # Load but don't start daemon

# Boot parameters
BOOT_TIMEOUT="5"             # Seconds before auto-boot
ENABLE_SERIAL_CONSOLE="no"   # Enable serial console access

#==============================================================================
# CUSTOMIZATION
#==============================================================================

# Custom hostname
HOSTNAME="virtos"

# Custom scripts directory (optional)
# Place custom scripts in config/custom-scripts/
# They will be copied to /usr/local/bin/
INCLUDE_CUSTOM_SCRIPTS="yes"

# Additional kernel modules to load
# Space-separated list
EXTRA_MODULES=""

# Additional kernel boot parameters
EXTRA_BOOT_PARAMS=""

#==============================================================================
# BUILD OPTIONS
#==============================================================================

# Compression level (1-9, higher = smaller but slower)
COMPRESSION_LEVEL="9"

# Create USB-bootable hybrid ISO
CREATE_HYBRID_ISO="yes"

# Generate checksums (MD5, SHA256)
GENERATE_CHECKSUMS="yes"

# Clean workspace after build
CLEAN_AFTER_BUILD="no"
