name: Feature Request
description: Suggest a new feature for VirtOS
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: Describe your ideal solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
      placeholder: Describe alternatives you've considered

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this affect?
      multiple: true
      options:
        - Core System
        - KVM/QEMU
        - LXC
        - Containers
        - Clustering
        - Networking
        - Storage
        - Monitoring
        - Security
        - TUI
        - Management Scripts
        - Documentation
        - Build System
        - New Component
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical - Blocking my use case
        - High - Would significantly improve my workflow
        - Medium - Nice to have
        - Low - Minor improvement
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe your specific use case
      placeholder: I want to use VirtOS for...
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples from Other Projects
      description: Does any other project have this feature?
      placeholder: e.g., "Proxmox has X feature that works like Y"

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature
          required: false
        - label: I can provide testing/feedback
          required: false
        - label: I can help with documentation
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing feature requests
          required: true
        - label: This feature aligns with VirtOS goals
          required: true
