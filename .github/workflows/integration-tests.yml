name: Integration Tests

on:
  pull_request:
    paths:
      - 'tests/integration/**'
      - 'config/custom-scripts/**'
      - '.github/workflows/integration-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'tests/integration/**'
      - 'config/custom-scripts/**'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

jobs:
  validate-tests:
    name: Validate Integration Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Validate test file syntax
        run: |
          echo "Validating BATS test files..."
          for test_file in tests/integration/*.bats; do
            if [ -f "$test_file" ]; then
              echo "Checking $test_file..."
              bash -n "$test_file" || exit 1
            fi
          done
          echo "✅ All test files have valid syntax"

      - name: Count integration tests
        run: |
          echo "## Integration Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_tests=0
          total_skip=0
          total_active=0

          for test_file in tests/integration/*.bats; do
            if [ -f "$test_file" ]; then
              file_name=$(basename "$test_file")
              tests=$(grep -c "^@test" "$test_file" || echo 0)
              skips=$(grep -c 'skip "' "$test_file" || echo 0)
              active=$((tests - skips))

              total_tests=$((total_tests + tests))
              total_skip=$((total_skip + skips))
              total_active=$((total_active + active))

              echo "| $file_name | $tests | $active | $skips |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| **TOTAL** | **$total_tests** | **$total_active** | **$total_skip** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Skipped tests require VirtOS runtime environment with libvirt, QEMU, and JPlatform." >> $GITHUB_STEP_SUMMARY

      - name: Check test fixtures
        run: |
          echo "## Test Fixtures" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "tests/integration/fixtures" ]; then
            fixture_count=$(find tests/integration/fixtures -name "*.yaml" | wc -l)
            echo "Found $fixture_count YAML fixtures:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            for fixture in tests/integration/fixtures/*.yaml; do
              if [ -f "$fixture" ]; then
                fixture_name=$(basename "$fixture")
                # Extract kind and name from YAML
                kind=$(grep "^kind:" "$fixture" | head -1 | awk '{print $2}')
                name=$(grep "name:" "$fixture" | head -1 | awk '{print $2}')
                echo "- \`$fixture_name\`: $kind ($name)" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No fixtures directory found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate YAML fixtures
        run: |
          echo "Validating YAML fixture syntax..."

          # Install yamllint if fixtures exist
          if [ -d "tests/integration/fixtures" ]; then
            pip install yamllint

            for fixture in tests/integration/fixtures/*.yaml; do
              if [ -f "$fixture" ]; then
                echo "Checking $(basename $fixture)..."
                yamllint -d relaxed "$fixture" || echo "⚠️  Warning: $(basename $fixture) has YAML issues"
              fi
            done
          fi

      - name: Display integration test info
        run: |
          echo "## 📋 Integration Test Suite Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 01-vm-lifecycle.bats | VM creation, start/stop, snapshots, backup/restore, migration |" >> $GITHUB_STEP_SUMMARY
          echo "| 02-jplatform.bats | JPlatform workload deployment, lifecycle, dependencies |" >> $GITHUB_STEP_SUMMARY
          echo "| 03-networking.bats | Network bridges, NAT, DHCP, port forwarding, bandwidth |" >> $GITHUB_STEP_SUMMARY
          echo "| 04-storage.bats | Storage pools, volumes, snapshots, cloning, attachment |" >> $GITHUB_STEP_SUMMARY
          echo "| 05-cluster.bats | Multi-host operations, migration, HA, load balancing |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Running Integration Tests Locally" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Install dependencies" >> $GITHUB_STEP_SUMMARY
          echo "sudo apt-get install -y libvirt-daemon-system qemu-kvm bats" >> $GITHUB_STEP_SUMMARY
          echo "sudo systemctl start libvirtd" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run all integration tests" >> $GITHUB_STEP_SUMMARY
          echo "cd tests/integration" >> $GITHUB_STEP_SUMMARY
          echo "bats *.bats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run specific test suite" >> $GITHUB_STEP_SUMMARY
          echo "bats 01-vm-lifecycle.bats" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Most tests are currently skipped and require a full VirtOS runtime environment." >> $GITHUB_STEP_SUMMARY

