# Security scanning and CVE monitoring workflow
# Runs comprehensive security checks on schedule and pull requests
# Related: Issue #116 (Security roadmap - CVE monitoring)

name: Security Scanning

on:
  # Run on PRs
  pull_request:
    branches: [ main, develop ]

  # Run on pushes to main
  push:
    branches: [ main ]

  # Run weekly security scans
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'

  # Allow manual triggers
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # Trivy filesystem scanning
  trivy-scan:
    name: Trivy Security Scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail build, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate Trivy report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-report.txt'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30

  # Dependency review (PRs only)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # Secret scanning (using gitleaks)
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  # ShellCheck security linting
  shellcheck-security:
    name: ShellCheck Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck with security focus
        run: |
          # Install ShellCheck
          sudo apt-get update
          sudo apt-get install -y shellcheck

          echo "Running ShellCheck security analysis..."

          # Find all shell scripts
          scripts=$(find config/custom-scripts packages/*/src -name "virtos-*" -type f 2>/dev/null || true)

          # Security-focused checks
          security_issues=0

          for script in $scripts; do
            if [ -f "$script" ]; then
              echo "Checking: $script"

              # Check for security issues (SC2006, SC2046, SC2086, etc.)
              if ! shellcheck -S warning "$script"; then
                security_issues=$((security_issues + 1))
              fi
            fi
          done

          if [ $security_issues -gt 0 ]; then
            echo "⚠️ Found security warnings in $security_issues script(s)"
            echo "Review warnings above for potential security issues"
          else
            echo "✓ No security warnings found"
          fi

  # OSSF Scorecard
  scorecard:
    name: OSSF Scorecard Analysis
    runs-on: ubuntu-latest
    # Only run on main branch (not PRs)
    if: github.event_name != 'pull_request'

    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload OSSF Scorecard results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # Security summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, secret-scan, shellcheck-security]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy (Vulnerabilities) | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks (Secrets) | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ShellCheck (Security) | ${{ needs.shellcheck-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Review findings in Security tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Address critical and high severity issues" >> $GITHUB_STEP_SUMMARY
          echo "3. Update dependencies with known CVEs" >> $GITHUB_STEP_SUMMARY
          echo "4. See [Security Hardening Guide](https://github.com/FlossWare/VirtOS/blob/main/docs/SECURITY_HARDENING.md)" >> $GITHUB_STEP_SUMMARY
