---
name: CI

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check directory structure
        run: |
          echo "Validating project structure..."
          test -d build || (echo "Missing build directory" && exit 1)
          test -d config || (echo "Missing config directory" && exit 1)
          test -d docs || (echo "Missing docs directory" && exit 1)
          test -d kernel || (echo "Missing kernel directory" && exit 1)
          test -d packages || (echo "Missing packages directory" && exit 1)
          echo "✓ Directory structure valid"

      - name: Check required files
        run: |
          echo "Checking required files..."
          test -f README.md || (echo "Missing README.md" && exit 1)
          test -f LICENSE || (echo "Missing LICENSE" && exit 1)
          test -f CONTRIBUTING.md || (echo "Missing CONTRIBUTING.md" && exit 1)
          test -f TESTING.md || (echo "Missing TESTING.md" && exit 1)
          echo "✓ Required files present"

      - name: Validate build scripts exist
        run: |
          echo "Checking build scripts..."
          test -x build/scripts/build-all.sh || (echo "build-all.sh missing or not executable" && exit 1)
          test -f build/build.conf || (echo "build.conf missing" && exit 1)
          echo "✓ Build scripts present"

  syntax-check:
    name: Shell Script Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check script syntax
        run: |
          echo "Checking shell script syntax..."
          EXIT_CODE=0

          # Check build scripts
          for script in build/scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || EXIT_CODE=1
            fi
          done

          # Check custom scripts
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || EXIT_CODE=1
            fi
          done

          # Check package build scripts
          for script in packages/*/build.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All scripts have valid syntax"
          else
            echo "✗ Some scripts have syntax errors"
          fi

          exit $EXIT_CODE

      - name: Run shellcheck (lint)
        run: |
          echo "Running shellcheck (errors and warnings)..."
          EXIT_CODE=0

          # Check build scripts
          # -S warning = fail on severity "warning" or higher (includes errors)
          for script in build/scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Linting $script..."
              shellcheck -S warning "$script" || EXIT_CODE=1
            fi
          done

          # Check custom scripts
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              echo "Linting $script..."
              shellcheck -S warning "$script" || EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All scripts passed shellcheck (no errors or warnings)"
          else
            echo "✗ Some scripts have errors or warnings"
          fi

          exit $EXIT_CODE

  permissions-check:
    name: Check File Permissions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check script permissions
        run: |
          echo "Checking script permissions..."
          EXIT_CODE=0

          # Build scripts should be executable
          for script in build/scripts/*.sh; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "✗ $script is not executable"
              EXIT_CODE=1
            fi
          done

          # Custom scripts should be executable
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "✗ $script is not executable"
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All scripts have correct permissions"
          fi

          exit $EXIT_CODE

  version-check:
    name: Version Synchronization Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version synchronization
        run: |
          ./ci/verify-version-sync.sh

  documentation-check:
    name: Documentation Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

      - name: Validate documentation structure
        run: |
          echo "Checking documentation..."
          test -f docs/INDEX.md || echo "⚠ Missing docs/INDEX.md"
          test -f docs/GETTING-STARTED.md || echo "⚠ Missing docs/GETTING-STARTED.md"
          test -f docs/ROADMAP.md || echo "⚠ Missing docs/ROADMAP.md"
          echo "✓ Core documentation present"

  build-test:
    name: Test Build Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate build.conf
        run: |
          echo "Validating build.conf..."
          source build/build.conf
          echo "✓ build.conf is valid"

      - name: Validate profiles
        run: |
          echo "Validating profiles..."
          for profile in config/profiles/*.conf; do
            if [ -f "$profile" ]; then
              echo "Checking $(basename $profile)..."
              source "$profile" && echo "✓ $(basename $profile) valid" || exit 1
            fi
          done

      - name: Check for required variables
        run: |
          echo "Checking build variables..."
          source build/build.conf

          # Check that key variables are defined
          : "${INCLUDE_KVM:?INCLUDE_KVM not defined}"
          : "${INCLUDE_LXC:?INCLUDE_LXC not defined}"
          echo "✓ Required variables defined"

  profile-validation:
    name: Validate Build Profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover and validate all profiles
        run: |
          echo "Discovering profiles in build/profiles/"
          EXIT_CODE=0
          PROFILE_COUNT=0

          if [ ! -d "build/profiles" ]; then
            echo "ERROR: build/profiles directory not found" >&2
            exit 1
          fi

          for profile_file in build/profiles/*.conf; do
            if [ -f "$profile_file" ]; then
              PROFILE=$(basename "$profile_file" .conf)
              PROFILE_COUNT=$((PROFILE_COUNT + 1))

              echo ""
              echo "=== Validating profile: $PROFILE ==="

              # Check syntax by sourcing
              if source "$profile_file" 2>/dev/null; then
                echo "✅ $PROFILE: Valid syntax"
              else
                echo "❌ $PROFILE: Syntax error"
                EXIT_CODE=1
              fi

              # Check for required variables (optional)
              if [ -n "${INCLUDE_KVM:-}" ]; then
                echo "  KVM: $INCLUDE_KVM"
              fi
            fi
          done

          if [ $PROFILE_COUNT -eq 0 ]; then
            echo "ERROR: No profile files found in build/profiles/" >&2
            exit 1
          fi

          echo ""
          echo "=== Summary ==="
          echo "Validated $PROFILE_COUNT profile(s)"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All profiles valid"
          else
            echo "❌ Some profiles have errors"
          fi

          exit $EXIT_CODE

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      - name: Check for sensitive files
        run: |
          echo "Checking for sensitive files..."
          EXIT_CODE=0

          # Check for common sensitive files
          if [ -f .env ]; then
            echo "✗ Found .env file (should not be committed)"
            EXIT_CODE=1
          fi

          if grep -r "password\s*=" config/ 2>/dev/null | grep -v "example\|sample"; then
            echo "⚠ Found potential passwords in config files"
          fi

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ No obvious sensitive files found"
          fi

          exit $EXIT_CODE

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          cd tests
          echo "Running BATS test suite..."
          EXIT_CODE=0

          # Run all test files
          for test_file in virtos-*.bats; do
            if [ -f "$test_file" ]; then
              echo "Running $test_file..."
              if ! bats "$test_file"; then
                EXIT_CODE=1
                echo "✗ $test_file failed"
              else
                echo "✓ $test_file passed"
              fi
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All unit tests passed"
          else
            echo "✗ Some unit tests failed"
          fi

          exit $EXIT_CODE

      - name: Generate test coverage report
        if: always()
        run: |
          cd tests

          echo "## 📊 Unit Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test files
          test_files=$(ls -1 virtos-*.bats 2>/dev/null | wc -l)

          # Count scripts
          script_files=$(ls -1 ../config/custom-scripts/virtos-* 2>/dev/null | wc -l)

          # Calculate coverage percentage
          if [ $script_files -gt 0 ]; then
            coverage=$((test_files * 100 / script_files))
          else
            coverage=0
          fi

          # Count total tests
          total_tests=0
          for test_file in virtos-*.bats; do
            if [ -f "$test_file" ]; then
              tests=$(grep -c "^@test" "$test_file" || echo 0)
              total_tests=$((total_tests + tests))
            fi
          done

          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Files | $test_files |" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts Covered | $script_files |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${coverage}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $total_tests |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $coverage -eq 100 ]; then
            echo "✅ **100% test coverage achieved!**" >> $GITHUB_STEP_SUMMARY
          elif [ $coverage -ge 80 ]; then
            echo "✅ **Excellent test coverage ($coverage%)**" >> $GITHUB_STEP_SUMMARY
          elif [ $coverage -ge 50 ]; then
            echo "⚠️ **Good test coverage ($coverage%), aim for 80%+**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Low test coverage ($coverage%), needs improvement**" >> $GITHUB_STEP_SUMMARY
          fi

  package-build:
    name: Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Build virtos-tools package
        run: |
          cd packages
          ./build-all.sh

      - name: Verify package was created
        run: |
          if [ -f packages/output/virtos-tools.tcz ]; then
            echo "✓ Package built successfully"
            ls -lh packages/output/virtos-tools.tcz
          else
            echo "✗ Package build failed"
            exit 1
          fi

      - name: Verify package contents
        run: |
          cd packages/output
          md5sum -c virtos-tools.tcz.md5.txt
          echo "✓ Checksum verified"

      - name: Check package size
        run: |
          # Use portable wc -c for file size (works on Linux, macOS, BSD)
          SIZE=$(wc -c < packages/output/virtos-tools.tcz | tr -d ' ')
          echo "Package size: $SIZE bytes"

          if [ "$SIZE" -lt 100000 ]; then
            echo "✗ Package too small ($SIZE bytes), likely incomplete"
            exit 1
          fi

          if [ "$SIZE" -gt 1000000 ]; then
            echo "⚠ Package larger than expected ($SIZE bytes)"
          fi

          echo "✓ Package size acceptable ($SIZE bytes)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtos-tools-package
          path: |
            packages/output/virtos-tools.tcz
            packages/output/virtos-tools.tcz.md5.txt
            packages/output/virtos-tools.tcz.info
          retention-days: 30

  code-metrics:
    name: Code Quality Metrics
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats jq bc

      - name: Calculate code metrics
        run: |
          echo "Calculating code quality metrics..."

          # Create metrics directory
          mkdir -p .metrics

          # Initialize metrics JSON
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA="${GITHUB_SHA:-unknown}"

          # 1. Code Coverage (from BATS tests)
          echo "=== Test Coverage ==="
          SCRIPT_COUNT=$(find config/custom-scripts -name "virtos-*" -type f | wc -l)
          TEST_COUNT=$(find tests -name "virtos-*.bats" -type f | wc -l)
          TOTAL_TESTS=$(grep -r "^@test" tests/*.bats 2>/dev/null | wc -l || echo 0)

          if [ "$SCRIPT_COUNT" -gt 0 ]; then
            COVERAGE_PCT=$(echo "scale=2; ($TEST_COUNT * 100) / $SCRIPT_COUNT" | bc)
          else
            COVERAGE_PCT=0
          fi

          # 2. ShellCheck warnings/errors
          echo "=== ShellCheck Analysis ==="
          SHELLCHECK_ERRORS=0
          SHELLCHECK_WARNINGS=0
          SHELLCHECK_INFO=0

          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              # Count by severity
              ERRORS=$(shellcheck -f gcc "$script" 2>/dev/null | grep -c "error:" || echo 0)
              WARNINGS=$(shellcheck -f gcc "$script" 2>/dev/null | grep -c "warning:" || echo 0)
              INFO=$(shellcheck -f gcc "$script" 2>/dev/null | grep -c "note:" || echo 0)

              SHELLCHECK_ERRORS=$((SHELLCHECK_ERRORS + ERRORS))
              SHELLCHECK_WARNINGS=$((SHELLCHECK_WARNINGS + WARNINGS))
              SHELLCHECK_INFO=$((SHELLCHECK_INFO + INFO))
            fi
          done

          # 3. Code Complexity Metrics
          echo "=== Code Complexity ==="
          TOTAL_LINES=0
          TOTAL_FUNCTIONS=0
          MAX_LINES=0
          MAX_LINES_SCRIPT=""

          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              LINES=$(wc -l < "$script")
              TOTAL_LINES=$((TOTAL_LINES + LINES))

              # Count functions (pattern: function_name() or function function_name)
              FUNCS=$(grep -cE "^[a-zA-Z_][a-zA-Z0-9_]*\(\)|^function [a-zA-Z_]" "$script" || echo 0)
              TOTAL_FUNCTIONS=$((TOTAL_FUNCTIONS + FUNCS))

              # Track largest script
              if [ "$LINES" -gt "$MAX_LINES" ]; then
                MAX_LINES=$LINES
                MAX_LINES_SCRIPT=$(basename "$script")
              fi
            fi
          done

          AVG_LINES_PER_SCRIPT=$(echo "scale=0; $TOTAL_LINES / $SCRIPT_COUNT" | bc)

          # 4. Code Duplication Detection
          echo "=== Code Duplication ==="

          # Create temp file for duplication report
          DUPLICATION_REPORT=".metrics/duplication.txt"
          > "$DUPLICATION_REPORT"

          # Look for common duplicate patterns
          DUPLICATE_SHOW_HELP=$(grep -l "show_help()" config/custom-scripts/virtos-* | wc -l)
          DUPLICATE_GET_VERSION=$(grep -l "get_version()" config/custom-scripts/virtos-* | wc -l)
          DUPLICATE_SET_E=$(grep -l "set -e" config/custom-scripts/virtos-* | wc -l)

          # Detect duplicate code blocks (5+ consecutive lines)
          echo "Scanning for duplicate code blocks (5+ lines)..." | tee -a "$DUPLICATION_REPORT"

          # Extract functions and significant code blocks from all scripts
          TEMP_BLOCKS=".metrics/code_blocks"
          mkdir -p "$TEMP_BLOCKS"

          # Extract code blocks from each script (functions and case blocks)
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              script_name=$(basename "$script")

              # Extract functions (looking for function definitions)
              awk '/^[a-zA-Z_][a-zA-Z0-9_]*\(\)|^function [a-zA-Z_]/ {
                start=NR
                name=$1
                gsub(/\(\)|function /, "", name)
                block=""
              }
              start && NR > start {
                if (/^}$/ && block ~ /\n.*\n.*\n.*\n/) {
                  print FILENAME ":" name ":" block
                  start=0
                  block=""
                } else {
                  block = block "\n" $0
                }
              }' "$script" >> "$TEMP_BLOCKS/functions.txt" 2>/dev/null || true
            fi
          done

          # Find duplicate 5-line blocks across scripts
          DUPLICATE_BLOCKS=0
          DUPLICATE_SCRIPTS=0
          HIGH_DUPLICATION_SCRIPTS=""

          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              script_name=$(basename "$script")
              script_lines=$(wc -l < "$script")
              duplicated_lines=0

              # Extract all 5-line windows from this script
              total_windows=$((script_lines - 4))
              if [ "$total_windows" -gt 0 ]; then
                for i in $(seq 1 "$total_windows"); do
                  # Get 5-line block
                  block=$(sed -n "${i},$((i+4))p" "$script" | grep -v "^#" | grep -v "^[[:space:]]*$" || true)

                  # Skip if block is too short or just comments/whitespace
                  block_lines=$(echo "$block" | grep -c . || echo 0)
                  if [ "$block_lines" -lt 3 ]; then
                    continue
                  fi

                  # Check if this block appears in other scripts
                  matches=0
                  for other_script in config/custom-scripts/virtos-*; do
                    if [ "$script" != "$other_script" ] && [ -f "$other_script" ]; then
                      if grep -Fq "$block" "$other_script" 2>/dev/null; then
                        matches=$((matches + 1))
                      fi
                    fi
                  done

                  if [ "$matches" -gt 0 ]; then
                    duplicated_lines=$((duplicated_lines + 1))
                  fi
                done
              fi

              # Calculate duplication percentage for this script
              if [ "$script_lines" -gt 0 ]; then
                script_dup_pct=$(echo "scale=2; ($duplicated_lines * 100) / $script_lines" | bc)

                # Flag scripts with >20% duplication
                if (( $(echo "$script_dup_pct > 20" | bc -l) )); then
                  DUPLICATE_SCRIPTS=$((DUPLICATE_SCRIPTS + 1))
                  echo "⚠️  $script_name: ${script_dup_pct}% duplicated" | tee -a "$DUPLICATION_REPORT"
                  HIGH_DUPLICATION_SCRIPTS="${HIGH_DUPLICATION_SCRIPTS}${script_name} (${script_dup_pct}%), "
                fi
              fi
            fi
          done

          # Calculate overall duplication metrics
          COMMON_PATTERNS=$((DUPLICATE_SHOW_HELP + DUPLICATE_GET_VERSION + DUPLICATE_SET_E))
          PATTERN_CONSISTENCY_PCT=$(echo "scale=2; ($COMMON_PATTERNS * 100) / ($SCRIPT_COUNT * 3)" | bc)

          # Summary
          echo "" | tee -a "$DUPLICATION_REPORT"
          echo "Duplication Summary:" | tee -a "$DUPLICATION_REPORT"
          echo "- Scripts with >20% duplication: $DUPLICATE_SCRIPTS" | tee -a "$DUPLICATION_REPORT"
          echo "- Pattern consistency: ${PATTERN_CONSISTENCY_PCT}%" | tee -a "$DUPLICATION_REPORT"

          # Calculate overall duplication percentage (weighted: 70% block duplication, 30% pattern consistency)
          if [ "$SCRIPT_COUNT" -gt 0 ]; then
            BLOCK_DUP_PCT=$(echo "scale=2; ($DUPLICATE_SCRIPTS * 100) / $SCRIPT_COUNT" | bc)
            DUPLICATION_PCT=$(echo "scale=2; ($BLOCK_DUP_PCT * 0.7) + ($PATTERN_CONSISTENCY_PCT * 0.3)" | bc)
          else
            DUPLICATION_PCT=0
          fi

          # 5. Documentation Coverage
          echo "=== Documentation ==="
          SCRIPTS_WITH_HELP=$(grep -l "show_help\|--help" config/custom-scripts/virtos-* | wc -l)
          SCRIPTS_WITH_VERSION=$(grep -l "get_version\|--version" config/custom-scripts/virtos-* | wc -l)
          DOC_COVERAGE=$(echo "scale=2; ($SCRIPTS_WITH_HELP * 100) / $SCRIPT_COUNT" | bc)

          # Save metrics to JSON
          cat > .metrics/metrics.json <<EOF
          {
            "timestamp": "$TIMESTAMP",
            "commit": "$COMMIT_SHA",
            "coverage": {
              "scripts": $SCRIPT_COUNT,
              "test_files": $TEST_COUNT,
              "total_tests": $TOTAL_TESTS,
              "percentage": $COVERAGE_PCT
            },
            "shellcheck": {
              "errors": $SHELLCHECK_ERRORS,
              "warnings": $SHELLCHECK_WARNINGS,
              "info": $SHELLCHECK_INFO
            },
            "complexity": {
              "total_lines": $TOTAL_LINES,
              "total_functions": $TOTAL_FUNCTIONS,
              "avg_lines_per_script": $AVG_LINES_PER_SCRIPT,
              "max_lines": $MAX_LINES,
              "max_lines_script": "$MAX_LINES_SCRIPT"
            },
            "duplication": {
              "common_patterns": $COMMON_PATTERNS,
              "pattern_consistency": $PATTERN_CONSISTENCY_PCT,
              "scripts_with_high_duplication": $DUPLICATE_SCRIPTS,
              "block_duplication_pct": $BLOCK_DUP_PCT,
              "overall_percentage": $DUPLICATION_PCT
            },
            "documentation": {
              "scripts_with_help": $SCRIPTS_WITH_HELP,
              "scripts_with_version": $SCRIPTS_WITH_VERSION,
              "coverage": $DOC_COVERAGE
            }
          }
          EOF

          # Output metrics to environment for next step
          echo "SCRIPT_COUNT=$SCRIPT_COUNT" >> $GITHUB_ENV
          echo "TEST_COUNT=$TEST_COUNT" >> $GITHUB_ENV
          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "COVERAGE_PCT=$COVERAGE_PCT" >> $GITHUB_ENV
          echo "SHELLCHECK_ERRORS=$SHELLCHECK_ERRORS" >> $GITHUB_ENV
          echo "SHELLCHECK_WARNINGS=$SHELLCHECK_WARNINGS" >> $GITHUB_ENV
          echo "SHELLCHECK_INFO=$SHELLCHECK_INFO" >> $GITHUB_ENV
          echo "TOTAL_LINES=$TOTAL_LINES" >> $GITHUB_ENV
          echo "TOTAL_FUNCTIONS=$TOTAL_FUNCTIONS" >> $GITHUB_ENV
          echo "AVG_LINES_PER_SCRIPT=$AVG_LINES_PER_SCRIPT" >> $GITHUB_ENV
          echo "MAX_LINES=$MAX_LINES" >> $GITHUB_ENV
          echo "MAX_LINES_SCRIPT=$MAX_LINES_SCRIPT" >> $GITHUB_ENV
          echo "DUPLICATION_PCT=$DUPLICATION_PCT" >> $GITHUB_ENV
          echo "PATTERN_CONSISTENCY_PCT=$PATTERN_CONSISTENCY_PCT" >> $GITHUB_ENV
          echo "BLOCK_DUP_PCT=$BLOCK_DUP_PCT" >> $GITHUB_ENV
          echo "DUPLICATE_SCRIPTS=$DUPLICATE_SCRIPTS" >> $GITHUB_ENV
          echo "HIGH_DUPLICATION_SCRIPTS=$HIGH_DUPLICATION_SCRIPTS" >> $GITHUB_ENV
          echo "SCRIPTS_WITH_HELP=$SCRIPTS_WITH_HELP" >> $GITHUB_ENV
          echo "DOC_COVERAGE=$DOC_COVERAGE" >> $GITHUB_ENV

          echo "✓ Metrics calculated and saved"

      - name: Generate metrics report
        run: |
          echo "## 📊 Code Quality Metrics Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test Coverage Section
          echo "### 🧪 Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Scripts | $SCRIPT_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Files | $TEST_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL_TESTS |" >> $GITHUB_STEP_SUMMARY
          echo "| **Coverage** | **${COVERAGE_PCT}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage status indicator
          if (( $(echo "$COVERAGE_PCT >= 100" | bc -l) )); then
            echo "✅ **Perfect coverage - all scripts tested!**" >> $GITHUB_STEP_SUMMARY
          elif (( $(echo "$COVERAGE_PCT >= 80" | bc -l) )); then
            echo "✅ **Excellent coverage**" >> $GITHUB_STEP_SUMMARY
          elif (( $(echo "$COVERAGE_PCT >= 50" | bc -l) )); then
            echo "⚠️ **Good coverage, aim for 80%+**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Coverage needs improvement**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # ShellCheck Section
          echo "### 🔍 ShellCheck Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $SHELLCHECK_ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| Warnings | $SHELLCHECK_WARNINGS |" >> $GITHUB_STEP_SUMMARY
          echo "| Info | $SHELLCHECK_INFO |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ShellCheck status
          if [ "$SHELLCHECK_ERRORS" -eq 0 ] && [ "$SHELLCHECK_WARNINGS" -eq 0 ]; then
            echo "✅ **No errors or warnings - clean code!**" >> $GITHUB_STEP_SUMMARY
          elif [ "$SHELLCHECK_ERRORS" -eq 0 ]; then
            echo "⚠️ **No errors, but $SHELLCHECK_WARNINGS warnings to address**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$SHELLCHECK_ERRORS errors need fixing**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Code Complexity Section
          echo "### 📏 Code Complexity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Lines | $TOTAL_LINES |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Functions | $TOTAL_FUNCTIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| Avg Lines/Script | $AVG_LINES_PER_SCRIPT |" >> $GITHUB_STEP_SUMMARY
          echo "| Largest Script | $MAX_LINES_SCRIPT ($MAX_LINES lines) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Complexity status
          if [ "$AVG_LINES_PER_SCRIPT" -lt 300 ]; then
            echo "✅ **Good script size - well modularized**" >> $GITHUB_STEP_SUMMARY
          elif [ "$AVG_LINES_PER_SCRIPT" -lt 500 ]; then
            echo "⚠️ **Moderate complexity - consider refactoring large scripts**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **High complexity - refactoring recommended**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Documentation Section
          echo "### 📚 Documentation Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts with --help | $SCRIPTS_WITH_HELP |" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts with --version | $SCRIPTS_WITH_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Documentation Coverage** | **${DOC_COVERAGE}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Documentation status
          if (( $(echo "$DOC_COVERAGE >= 95" | bc -l) )); then
            echo "✅ **Excellent documentation**" >> $GITHUB_STEP_SUMMARY
          elif (( $(echo "$DOC_COVERAGE >= 80" | bc -l) )); then
            echo "⚠️ **Good documentation, some scripts need help text**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Documentation needs improvement**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Code Duplication Section
          echo "### 🔁 Code Duplication Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts with >20% Duplication | $DUPLICATE_SCRIPTS |" >> $GITHUB_STEP_SUMMARY
          echo "| Block Duplication | ${BLOCK_DUP_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern Consistency | ${PATTERN_CONSISTENCY_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Overall Duplication** | **${DUPLICATION_PCT}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Duplication status
          if (( $(echo "$DUPLICATION_PCT < 15" | bc -l) )) && [ "$DUPLICATE_SCRIPTS" -eq 0 ]; then
            echo "✅ **Excellent - minimal duplication detected**" >> $GITHUB_STEP_SUMMARY
          elif (( $(echo "$DUPLICATION_PCT < 30" | bc -l) )) && [ "$DUPLICATE_SCRIPTS" -le 3 ]; then
            echo "✅ **Good - acceptable duplication levels**" >> $GITHUB_STEP_SUMMARY
          elif [ "$DUPLICATE_SCRIPTS" -gt 0 ]; then
            echo "⚠️ **Warning: $DUPLICATE_SCRIPTS script(s) have >20% duplicated code**" >> $GITHUB_STEP_SUMMARY
            if [ -n "$HIGH_DUPLICATION_SCRIPTS" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Scripts flagged:** ${HIGH_DUPLICATION_SCRIPTS%, }" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ **Moderate duplication - consider refactoring common code**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Pattern usage table
          echo "**Common Patterns:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Scripts Using |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|" >> $GITHUB_STEP_SUMMARY
          SET_E_COUNT=$(grep -l "set -e" config/custom-scripts/virtos-* | wc -l)
          HELP_COUNT=$(grep -l "show_help()" config/custom-scripts/virtos-* | wc -l)
          VERSION_COUNT=$(grep -l "get_version()" config/custom-scripts/virtos-* | wc -l)
          echo "| Error handling (set -e) | $SET_E_COUNT/$SCRIPT_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Help function | $HELP_COUNT/$SCRIPT_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Version function | $VERSION_COUNT/$SCRIPT_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall Quality Score
          echo "### 🏆 Overall Quality Score" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Calculate quality score (0-100)
          # - Test coverage: 40 points max
          # - No ShellCheck errors: 25 points
          # - Documentation: 20 points max
          # - Code size (under 300 avg): 15 points

          QUALITY_SCORE=0

          # Test coverage (up to 40 points)
          QUALITY_SCORE=$(echo "scale=0; $QUALITY_SCORE + ($COVERAGE_PCT * 0.4)" | bc)

          # ShellCheck (25 points if no errors, 15 if no warnings, 0 otherwise)
          if [ "$SHELLCHECK_ERRORS" -eq 0 ] && [ "$SHELLCHECK_WARNINGS" -eq 0 ]; then
            QUALITY_SCORE=$(echo "$QUALITY_SCORE + 25" | bc)
          elif [ "$SHELLCHECK_ERRORS" -eq 0 ]; then
            QUALITY_SCORE=$(echo "$QUALITY_SCORE + 15" | bc)
          fi

          # Documentation (up to 20 points)
          QUALITY_SCORE=$(echo "scale=0; $QUALITY_SCORE + ($DOC_COVERAGE * 0.2)" | bc)

          # Code size (15 points if avg < 300, scaled down if larger)
          if [ "$AVG_LINES_PER_SCRIPT" -lt 300 ]; then
            QUALITY_SCORE=$(echo "$QUALITY_SCORE + 15" | bc)
          elif [ "$AVG_LINES_PER_SCRIPT" -lt 500 ]; then
            QUALITY_SCORE=$(echo "$QUALITY_SCORE + 10" | bc)
          else
            QUALITY_SCORE=$(echo "$QUALITY_SCORE + 5" | bc)
          fi

          echo "**Score: $QUALITY_SCORE/100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$QUALITY_SCORE" -ge 90 ]; then
            echo "✅ **Excellent quality - keep it up!**" >> $GITHUB_STEP_SUMMARY
          elif [ "$QUALITY_SCORE" -ge 75 ]; then
            echo "✅ **Good quality - minor improvements possible**" >> $GITHUB_STEP_SUMMARY
          elif [ "$QUALITY_SCORE" -ge 60 ]; then
            echo "⚠️ **Acceptable quality - room for improvement**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Quality needs attention**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-metrics
          path: |
            .metrics/metrics.json
            .metrics/duplication.txt
          retention-days: 90

      - name: Compare with previous metrics
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Metrics Trend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Try to download previous metrics (if available)
          # This would require artifact persistence across runs
          # For now, just indicate this is the baseline

          echo "**Baseline established** - Future runs will show trend comparisons" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Current metrics saved for comparison with future commits." >> $GITHUB_STEP_SUMMARY

  integration-test-validate:
    name: Validate Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Validate integration test syntax
        run: |
          echo "Validating integration test syntax..."
          EXIT_CODE=0

          for test_file in tests/integration/*.bats; do
            if [ -f "$test_file" ]; then
              echo "Checking $(basename $test_file)..."

              # Count tests to ensure file is valid
              test_count=$(grep -c "^@test" "$test_file" || echo 0)
              if [ "$test_count" -eq 0 ]; then
                echo "  ⚠️ Warning: No @test decorators found"
              fi

              # Check for common syntax patterns
              if ! grep -q "^load\|^@test" "$test_file" 2>/dev/null; then
                echo "  ⚠️ Warning: No load statements or @test decorators"
              fi

              echo "  ✓ $(basename $test_file) valid ($test_count tests)"
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All integration tests have valid structure"
          fi

      - name: Count total integration tests
        run: |
          echo "## 📊 Integration Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total=0
          suites=0

          for test_file in tests/integration/*.bats; do
            if [ -f "$test_file" ]; then
              suites=$((suites + 1))
              count=$(grep -c "^@test" "$test_file" || echo 0)
              total=$((total + count))
              echo "- $(basename $test_file): $count tests" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total**: $total tests across $suites suites" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note**: Integration tests require VirtOS runtime (libvirt, QEMU, platform-java)" >> $GITHUB_STEP_SUMMARY
          echo "See [RUNTIME_TESTING_PLAN.md](RUNTIME_TESTING_PLAN.md) for execution instructions." >> $GITHUB_STEP_SUMMARY

  documentation-link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for broken local links in markdown
        run: |
          echo "Checking for broken local links in documentation..."
          EXIT_CODE=0

          # Check all markdown files
          for doc in $(find . -name "*.md" -type f); do
            # Extract local file references [text](path)
            while IFS= read -r line; do
              # Match [text](local-path) patterns
              if [[ $line =~ \]\(([^)]+)\) ]]; then
                ref="${BASH_REMATCH[1]}"

                # Skip external URLs and anchors
                if [[ ! $ref =~ ^https?:// ]] && [[ $ref != *"#"* ]]; then
                  # Remove any anchor portion
                  file_path="${ref%%#*}"

                  # Check if file exists
                  if [ -n "$file_path" ] && [ ! -f "$file_path" ]; then
                    echo "  ❌ $doc: broken link to $file_path"
                    EXIT_CODE=1
                  fi
                fi
              fi
            done < "$doc"
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All local documentation links are valid"
          else
            echo "✗ Some documentation links are broken"
            exit $EXIT_CODE
          fi

      - name: Validate markdown syntax
        run: |
          echo "Validating markdown syntax..."
          EXIT_CODE=0

          # Check for common markdown issues
          for doc in $(find docs -name "*.md" -type f); do
            echo "Checking $(basename $doc)..."

            # Check for unclosed code blocks
            code_blocks=$(grep -c '```' "$doc" || echo 0)
            if [ $((code_blocks % 2)) -ne 0 ]; then
              echo "  ⚠️ Warning: Unclosed code block"
              EXIT_CODE=1
            fi

            # Check for valid heading structure
            if ! grep -q "^#" "$doc"; then
              echo "  ⚠️ Warning: No headings found"
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ Markdown syntax valid"
          fi

  code-examples-validation:
    name: Validate Code Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for syntax errors in shell examples
        run: |
          echo "Validating shell code examples in documentation..."

          # Extract bash code blocks from markdown files
          for doc in $(find docs -name "*.md" -type f 2>/dev/null); do
            echo "Checking examples in $(basename $doc)..."

            # Use awk to extract bash code blocks
            awk '
              /```bash/ { in_code=1; next }
              /```/ { in_code=0; next }
              in_code {
                print $0
              }
            ' "$doc" | {
              # Create temp file for code block
              code_file=$(mktemp)
              cat > "$code_file"

              # Check syntax if file is not empty
              if [ -s "$code_file" ]; then
                if ! bash -n "$code_file" 2>/dev/null; then
                  echo "  ⚠️ Syntax warning in example code (may be pseudo-code)"
                fi
              fi

              rm -f "$code_file"
            }
          done

          echo "✓ Code examples validated"

  iso-build-validation:
    name: Validate ISO Build Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check ISO build scripts exist
        run: |
          echo "Validating ISO build configuration..."
          EXIT_CODE=0

          # Check for build scripts
          if [ ! -f "build/scripts/build-iso.sh" ]; then
            echo "⚠️ Warning: build/scripts/build-iso.sh not found"
          else
            echo "✓ ISO build script found"
          fi

          # Check for ISO profile
          if [ ! -d "build/profiles" ] || [ -z "$(ls -A build/profiles/*.conf 2>/dev/null)" ]; then
            echo "⚠️ Warning: No build profiles found"
            EXIT_CODE=1
          else
            profile_count=$(ls -1 build/profiles/*.conf 2>/dev/null | wc -l)
            echo "✓ Found $profile_count build profiles"
          fi

          exit $EXIT_CODE

      - name: Validate ISO build prerequisites
        run: |
          echo "## ISO Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for ISO build dependencies
          MISSING_DEPS=""

          if ! command -v unsquashfs &> /dev/null; then
            MISSING_DEPS="$MISSING_DEPS squashfs-tools"
          fi

          if [ -n "$MISSING_DEPS" ]; then
            echo "⚠️ **Note**: The following tools are needed for ISO builds:" >> $GITHUB_STEP_SUMMARY
            echo "\`$MISSING_DEPS\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✓ **All ISO build tools available**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [ISO_TESTING_STATUS.md](ISO_TESTING_STATUS.md) for build validation procedures." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs:
      - validate
      - syntax-check
      - permissions-check
      - version-check
      - documentation-check
      - build-test
      - profile-validation
      - unit-tests
      - package-build
      - code-metrics
      - security-scan
      - integration-test-validate
      - documentation-link-check
      - code-examples-validation
      - iso-build-validation
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate comprehensive test report
        env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          SYNTAX_RESULT: ${{ needs.syntax-check.result }}
          PERMISSIONS_RESULT: ${{ needs.permissions-check.result }}
          VERSION_RESULT: ${{ needs.version-check.result }}
          DOC_CHECK_RESULT: ${{ needs.documentation-check.result }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          PROFILE_RESULT: ${{ needs.profile-validation.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          PACKAGE_RESULT: ${{ needs.package-build.result }}
          METRICS_RESULT: ${{ needs.code-metrics.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          INTEGRATION_TEST_RESULT: ${{ needs.integration-test-validate.result }}
          DOC_LINK_RESULT: ${{ needs.documentation-link-check.result }}
          CODE_EXAMPLES_RESULT: ${{ needs.code-examples-validation.result }}
          ISO_BUILD_RESULT: ${{ needs.iso-build-validation.result }}
        run: |
          # Helper function to get status icon
          get_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "# VirtOS CI Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pipeline Execution Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA**: ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref**: ${GITHUB_REF#refs/heads/}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### ✅ Automated Testing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This pipeline runs the following automated tests:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Syntax Validation** | Shell Script Syntax Check | $(get_icon $SYNTAX_RESULT) $SYNTAX_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Static Analysis** | ShellCheck Linting | $(get_icon $SYNTAX_RESULT) $SYNTAX_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Unit Tests** | Run Unit Tests (BATS) | $(get_icon $UNIT_TESTS_RESULT) $UNIT_TESTS_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Integration Tests** | Validate Integration Tests | $(get_icon $INTEGRATION_TEST_RESULT) $INTEGRATION_TEST_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Code Quality** | Code Quality Metrics | $(get_icon $METRICS_RESULT) $METRICS_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package Verification** | Build Packages | $(get_icon $PACKAGE_RESULT) $PACKAGE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Documentation** | Markdown & Link Validation | $(get_icon $DOC_CHECK_RESULT) $DOC_CHECK_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Doc Links** | Check Documentation Links | $(get_icon $DOC_LINK_RESULT) $DOC_LINK_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Code Examples** | Validate Code Examples | $(get_icon $CODE_EXAMPLES_RESULT) $CODE_EXAMPLES_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **ISO Build** | Validate ISO Build Config | $(get_icon $ISO_BUILD_RESULT) $ISO_BUILD_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Security** | Security Scanning & Checks | $(get_icon $SECURITY_RESULT) $SECURITY_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔍 Validation Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project structure | $(get_icon $VALIDATE_RESULT) $VALIDATE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| File permissions | $(get_icon $PERMISSIONS_RESULT) $PERMISSIONS_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Version synchronization | $(get_icon $VERSION_RESULT) $VERSION_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build configuration | $(get_icon $BUILD_TEST_RESULT) $BUILD_TEST_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build profiles | $(get_icon $PROFILE_RESULT) $PROFILE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          FAILED_JOBS=""
          if [ "$VALIDATE_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS validate"; fi
          if [ "$SYNTAX_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS syntax-check"; fi
          if [ "$PERMISSIONS_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS permissions-check"; fi
          if [ "$VERSION_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS version-check"; fi
          if [ "$DOC_CHECK_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS documentation-check"; fi
          if [ "$BUILD_TEST_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS build-test"; fi
          if [ "$PROFILE_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS profile-validation"; fi
          if [ "$UNIT_TESTS_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS unit-tests"; fi
          if [ "$PACKAGE_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS package-build"; fi
          if [ "$METRICS_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS code-metrics"; fi
          if [ "$SECURITY_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS security-scan"; fi
          if [ "$INTEGRATION_TEST_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS integration-test-validate"; fi
          if [ "$DOC_LINK_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS documentation-link-check"; fi
          if [ "$CODE_EXAMPLES_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS code-examples-validation"; fi
          if [ "$ISO_BUILD_RESULT" != "success" ]; then FAILED_JOBS="$FAILED_JOBS iso-build-validation"; fi

          echo "## Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -z "$FAILED_JOBS" ]; then
            echo "### ✅ All Tests Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Result**: All automated tests, validation checks, and quality metrics passed successfully." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Artifacts Generated" >> $GITHUB_STEP_SUMMARY
