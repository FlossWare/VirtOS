name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check directory structure
        run: |
          echo "Validating project structure..."
          test -d build || (echo "Missing build directory" && exit 1)
          test -d config || (echo "Missing config directory" && exit 1)
          test -d docs || (echo "Missing docs directory" && exit 1)
          test -d kernel || (echo "Missing kernel directory" && exit 1)
          test -d packages || (echo "Missing packages directory" && exit 1)
          echo "✓ Directory structure valid"

      - name: Check required files
        run: |
          echo "Checking required files..."
          test -f README.md || (echo "Missing README.md" && exit 1)
          test -f LICENSE || (echo "Missing LICENSE" && exit 1)
          test -f CONTRIBUTING.md || (echo "Missing CONTRIBUTING.md" && exit 1)
          test -f TESTING.md || (echo "Missing TESTING.md" && exit 1)
          echo "✓ Required files present"

      - name: Validate build scripts exist
        run: |
          echo "Checking build scripts..."
          test -x build/scripts/build-all.sh || (echo "build-all.sh missing or not executable" && exit 1)
          test -f build/build.conf || (echo "build.conf missing" && exit 1)
          echo "✓ Build scripts present"

  syntax-check:
    name: Shell Script Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check script syntax
        run: |
          echo "Checking shell script syntax..."
          EXIT_CODE=0

          # Check build scripts
          for script in build/scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || EXIT_CODE=1
            fi
          done

          # Check custom scripts
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || EXIT_CODE=1
            fi
          done

          # Check package build scripts
          for script in packages/*/build.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All scripts have valid syntax"
          else
            echo "✗ Some scripts have syntax errors"
          fi

          exit $EXIT_CODE

      - name: Run shellcheck (lint)
        run: |
          echo "Running shellcheck (errors only)..."
          EXIT_CODE=0

          # Check build scripts
          # -S error = only fail on severity "error", allow warnings/info
          for script in build/scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Linting $script..."
              shellcheck -S error "$script" || EXIT_CODE=1
            fi
          done

          # Check custom scripts
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              echo "Linting $script..."
              shellcheck -S error "$script" || EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All scripts passed shellcheck (no critical errors)"
            echo "ℹ Note: Warnings/info messages are allowed, only errors fail the build"
          else
            echo "✗ Some scripts have critical errors"
          fi

          exit $EXIT_CODE

  permissions-check:
    name: Check File Permissions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check script permissions
        run: |
          echo "Checking script permissions..."
          EXIT_CODE=0

          # Build scripts should be executable
          for script in build/scripts/*.sh; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "✗ $script is not executable"
              EXIT_CODE=1
            fi
          done

          # Custom scripts should be executable
          for script in config/custom-scripts/virtos-*; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "✗ $script is not executable"
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All scripts have correct permissions"
          fi

          exit $EXIT_CODE

  version-check:
    name: Version Synchronization Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version synchronization
        run: |
          ./ci/verify-version-sync.sh

  documentation-check:
    name: Documentation Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

      - name: Validate documentation structure
        run: |
          echo "Checking documentation..."
          test -f docs/INDEX.md || echo "⚠ Missing docs/INDEX.md"
          test -f docs/GETTING-STARTED.md || echo "⚠ Missing docs/GETTING-STARTED.md"
          test -f docs/ROADMAP.md || echo "⚠ Missing docs/ROADMAP.md"
          echo "✓ Core documentation present"

  build-test:
    name: Test Build Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate build.conf
        run: |
          echo "Validating build.conf..."
          source build/build.conf
          echo "✓ build.conf is valid"

      - name: Validate profiles
        run: |
          echo "Validating profiles..."
          for profile in config/profiles/*.conf; do
            if [ -f "$profile" ]; then
              echo "Checking $(basename $profile)..."
              source "$profile" && echo "✓ $(basename $profile) valid" || exit 1
            fi
          done

      - name: Check for required variables
        run: |
          echo "Checking build variables..."
          source build/build.conf

          # Check that key variables are defined
          : "${INCLUDE_KVM:?INCLUDE_KVM not defined}"
          : "${INCLUDE_LXC:?INCLUDE_LXC not defined}"
          echo "✓ Required variables defined"

  profile-validation:
    name: Validate Build Profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover and validate all profiles
        run: |
          echo "Discovering profiles in build/profiles/"
          EXIT_CODE=0
          PROFILE_COUNT=0

          if [ ! -d "build/profiles" ]; then
            echo "ERROR: build/profiles directory not found" >&2
            exit 1
          fi

          for profile_file in build/profiles/*.conf; do
            if [ -f "$profile_file" ]; then
              PROFILE=$(basename "$profile_file" .conf)
              PROFILE_COUNT=$((PROFILE_COUNT + 1))

              echo ""
              echo "=== Validating profile: $PROFILE ==="

              # Check syntax by sourcing
              if source "$profile_file" 2>/dev/null; then
                echo "✅ $PROFILE: Valid syntax"
              else
                echo "❌ $PROFILE: Syntax error"
                EXIT_CODE=1
              fi

              # Check for required variables (optional)
              if [ -n "${INCLUDE_KVM:-}" ]; then
                echo "  KVM: $INCLUDE_KVM"
              fi
            fi
          done

          if [ $PROFILE_COUNT -eq 0 ]; then
            echo "ERROR: No profile files found in build/profiles/" >&2
            exit 1
          fi

          echo ""
          echo "=== Summary ==="
          echo "Validated $PROFILE_COUNT profile(s)"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All profiles valid"
          else
            echo "❌ Some profiles have errors"
          fi

          exit $EXIT_CODE

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      - name: Check for sensitive files
        run: |
          echo "Checking for sensitive files..."
          EXIT_CODE=0

          # Check for common sensitive files
          if [ -f .env ]; then
            echo "✗ Found .env file (should not be committed)"
            EXIT_CODE=1
          fi

          if grep -r "password\s*=" config/ 2>/dev/null | grep -v "example\|sample"; then
            echo "⚠ Found potential passwords in config files"
          fi

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ No obvious sensitive files found"
          fi

          exit $EXIT_CODE

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          cd tests
          echo "Running BATS test suite..."
          EXIT_CODE=0

          # Run all test files
          for test_file in virtos-*.bats; do
            if [ -f "$test_file" ]; then
              echo "Running $test_file..."
              if ! bats "$test_file"; then
                EXIT_CODE=1
                echo "✗ $test_file failed"
              else
                echo "✓ $test_file passed"
              fi
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ All unit tests passed"
          else
            echo "✗ Some unit tests failed"
          fi

          exit $EXIT_CODE

      - name: Generate test coverage report
        if: always()
        run: |
          cd tests

          echo "## 📊 Unit Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test files
          test_files=$(ls -1 virtos-*.bats 2>/dev/null | wc -l)

          # Count scripts
          script_files=$(ls -1 ../config/custom-scripts/virtos-* 2>/dev/null | wc -l)

          # Calculate coverage percentage
          if [ $script_files -gt 0 ]; then
            coverage=$((test_files * 100 / script_files))
          else
            coverage=0
          fi

          # Count total tests
          total_tests=0
          for test_file in virtos-*.bats; do
            if [ -f "$test_file" ]; then
              tests=$(grep -c "^@test" "$test_file" || echo 0)
              total_tests=$((total_tests + tests))
            fi
          done

          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Files | $test_files |" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts Covered | $script_files |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${coverage}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $total_tests |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $coverage -eq 100 ]; then
            echo "✅ **100% test coverage achieved!**" >> $GITHUB_STEP_SUMMARY
          elif [ $coverage -ge 80 ]; then
            echo "✅ **Excellent test coverage ($coverage%)**" >> $GITHUB_STEP_SUMMARY
          elif [ $coverage -ge 50 ]; then
            echo "⚠️ **Good test coverage ($coverage%), aim for 80%+**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Low test coverage ($coverage%), needs improvement**" >> $GITHUB_STEP_SUMMARY
          fi

  package-build:
    name: Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Build virtos-tools package
        run: |
          cd packages
          ./build-all.sh

      - name: Verify package was created
        run: |
          if [ -f packages/output/virtos-tools.tcz ]; then
            echo "✓ Package built successfully"
            ls -lh packages/output/virtos-tools.tcz
          else
            echo "✗ Package build failed"
            exit 1
          fi

      - name: Verify package contents
        run: |
          cd packages/output
          md5sum -c virtos-tools.tcz.md5.txt
          echo "✓ Checksum verified"

      - name: Check package size
        run: |
          # Use portable wc -c for file size (works on Linux, macOS, BSD)
          SIZE=$(wc -c < packages/output/virtos-tools.tcz | tr -d ' ')
          echo "Package size: $SIZE bytes"

          if [ "$SIZE" -lt 100000 ]; then
            echo "✗ Package too small ($SIZE bytes), likely incomplete"
            exit 1
          fi

          if [ "$SIZE" -gt 1000000 ]; then
            echo "⚠ Package larger than expected ($SIZE bytes)"
          fi

          echo "✓ Package size acceptable ($SIZE bytes)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtos-tools-package
          path: |
            packages/output/virtos-tools.tcz
            packages/output/virtos-tools.tcz.md5.txt
            packages/output/virtos-tools.tcz.info
          retention-days: 30

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate, syntax-check, permissions-check, version-check, build-test, profile-validation, unit-tests, package-build]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          SYNTAX_RESULT: ${{ needs.syntax-check.result }}
          PERMISSIONS_RESULT: ${{ needs.permissions-check.result }}
          VERSION_RESULT: ${{ needs.version-check.result }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          PROFILE_RESULT: ${{ needs.profile-validation.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          PACKAGE_RESULT: ${{ needs.package-build.result }}
        run: |
          # Helper function to get status icon
          get_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "## VirtOS CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $VALIDATE_RESULT) Project structure: $VALIDATE_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $SYNTAX_RESULT) Shell script syntax: $SYNTAX_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $PERMISSIONS_RESULT) File permissions: $PERMISSIONS_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $VERSION_RESULT) Version sync: $VERSION_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $BUILD_TEST_RESULT) Build config: $BUILD_TEST_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $PROFILE_RESULT) Build profiles: $PROFILE_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Testing" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $UNIT_TESTS_RESULT) Unit tests: $UNIT_TESTS_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build" >> $GITHUB_STEP_SUMMARY
          echo "- $(get_icon $PACKAGE_RESULT) Package build: $PACKAGE_RESULT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [ "$VALIDATE_RESULT" = "success" ] && \
             [ "$SYNTAX_RESULT" = "success" ] && \
             [ "$PERMISSIONS_RESULT" = "success" ] && \
             [ "$VERSION_RESULT" = "success" ] && \
             [ "$BUILD_TEST_RESULT" = "success" ] && \
             [ "$PROFILE_RESULT" = "success" ] && \
             [ "$UNIT_TESTS_RESULT" = "success" ] && \
             [ "$PACKAGE_RESULT" = "success" ]; then
            echo "### ✅ Overall: All checks passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 virtos-tools package available for download" >> $GITHUB_STEP_SUMMARY
            echo "- ⏱️ Artifacts retained for 30 days" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Overall: Some checks failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the failed jobs above." >> $GITHUB_STEP_SUMMARY
          fi
