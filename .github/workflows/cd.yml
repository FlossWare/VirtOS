name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.pusher.email != 'version-bump@flossware.org'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .gitconfig for version bumps
        uses: oleksiyrudenko/gha-git-credentials@latest
        with:
          global: true
          name: 'Version Bump'
          email: 'version-bump@flossware.org'
          actor: 'VersionBump'
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools curl

      - name: Read current version
        id: version
        run: |
          CURRENT_VERSION=$(cat VERSION)
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Increment version
        id: new_version
        run: |
          CURRENT_VERSION=$(cat VERSION)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}"

          echo "$NEXT_VERSION" > VERSION
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version from $CURRENT_VERSION to $NEXT_VERSION"

      - name: Update package versions
        run: |
          VERSION=${{ steps.new_version.outputs.version }}

          # Update all package info files
          for info_file in packages/*/virtos-*.tcz.info; do
            if [ -f "$info_file" ]; then
              sed -i "s/^Version:.*/Version:        $VERSION/" "$info_file"
              echo "Updated $(basename $info_file) to version $VERSION"
            fi
          done

      - name: Build all packages
        run: |
          cd packages
          ./build-all.sh

          # Verify packages were built
          if [ ! -d output ] || [ -z "$(ls -A output/*.tcz 2>/dev/null)" ]; then
            echo "❌ No packages built"
            exit 1
          fi

          echo "✅ Packages built:"
          ls -lh output/*.tcz

      - name: Validate packages before deployment
        run: |
          echo "Validating packages before deployment..."
          EXIT_CODE=0

          # 1. Verify package contents
          echo "Checking package contents..."
          for package in packages/output/*.tcz; do
            if [ -f "$package" ]; then
              echo "  Checking $(basename $package)..."

              # Verify it's a valid squashfs
              if ! unsquashfs -l "$package" >/dev/null 2>&1; then
                echo "    ❌ Invalid squashfs format"
                EXIT_CODE=1
              fi

              # Check for expected files
              if [[ "$package" == *"virtos-tools"* ]]; then
                if ! unsquashfs -l "$package" | grep -q "usr/local/bin/virtos-"; then
                  echo "    ❌ Missing virtos-* scripts"
                  EXIT_CODE=1
                fi
              fi

              echo "    ✓ Valid"
            fi
          done

          # 2. Check package metadata
          echo "Checking package metadata..."
          for info_file in packages/output/*.tcz.info; do
            if [ -f "$info_file" ]; then
              echo "  Checking $(basename $info_file)..."

              # Verify required fields
              if ! grep -q "^Title:" "$info_file"; then
                echo "    ❌ Missing Title field"
                EXIT_CODE=1
              fi
              if ! grep -q "^Version:" "$info_file"; then
                echo "    ❌ Missing Version field"
                EXIT_CODE=1
              fi

              echo "    ✓ Valid"
            fi
          done

          # 3. Run syntax checks on packaged scripts
          echo "Running syntax checks..."
          for package in packages/output/virtos-tools*.tcz; do
            if [ -f "$package" ]; then
              TEMP_DIR=$(mktemp -d)
              unsquashfs -d "$TEMP_DIR" "$package" >/dev/null 2>&1

              for script in "$TEMP_DIR"/usr/local/bin/virtos-*; do
                if [ -f "$script" ] && [ -x "$script" ]; then
                  if ! bash -n "$script" 2>/dev/null; then
                    echo "  ❌ Syntax error in $(basename $script)"
                    EXIT_CODE=1
                  fi
                fi
              done

              rm -rf "$TEMP_DIR"
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All package validations passed"
          else
            echo "❌ Package validation failed"
            exit 1
          fi

      - name: Deploy to packagecloud.io
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
        run: |
          if [ -z "$PACKAGECLOUD_TOKEN" ]; then
            echo "⚠️ PACKAGECLOUD_TOKEN not set, skipping deployment"
            exit 0
          fi

          # Install packagecloud CLI
          sudo gem install package_cloud

          # Deploy each package (TCZ packages as generic files)
          for package in packages/output/*.tcz; do
            if [ -f "$package" ]; then
              echo "Deploying $(basename $package) to packagecloud.io..."
              # TCZ packages are uploaded as generic files (no distro versioning)
              package_cloud push flossware/virtos "$package" || echo "⚠️ Deploy failed for $package"
            fi
          done

      - name: Commit version bump
        run: |
          VERSION=${{ steps.new_version.outputs.version }}
          # Add VERSION file and source .tcz.info files (not output/)
          git add VERSION
          git add packages/virtos-tools/virtos-tools.tcz.info
          git add packages/virtos-jplatform/virtos-jplatform.tcz.info
          git commit -m "chore: bump version to ${VERSION} [ci skip]"

      - name: Create release tag
        run: |
          VERSION=${{ steps.new_version.outputs.version }}
          git tag -a "v${VERSION}" -m "Release version ${VERSION}"

      - name: Push version bump and tag
        run: |
          VERSION=${{ steps.new_version.outputs.version }}

          # Try to push with retry and rebase on rejection
          MAX_RETRIES=3
          RETRY=0

          while [ $RETRY -lt $MAX_RETRIES ]; do
            if git push origin main; then
              echo "✅ Version bump pushed successfully"
              break
            else
              RETRY=$((RETRY + 1))
              if [ $RETRY -lt $MAX_RETRIES ]; then
                echo "⚠️ Push rejected (attempt $RETRY/$MAX_RETRIES), rebasing..."
                git fetch origin main
                git rebase origin/main
                sleep 2
              else
                echo "❌ Failed to push after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done

          # Push tag
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: VirtOS v${{ steps.new_version.outputs.version }}
          body: |
            ## VirtOS v${{ steps.new_version.outputs.version }}

            ### Packages
            - virtos-tools.tcz - Core VirtOS management tools
            - virtos-jplatform.tcz - JPlatform integration

            ### Installation
            ```bash
            # On Tiny Core Linux / VirtOS
            tce-load -wi virtos-tools
            tce-load -wi virtos-jplatform
            ```

            ### packagecloud.io
            Packages are available at: https://packagecloud.io/flossware/virtos
          files: |
            packages/output/*.tcz
            packages/output/*.tcz.md5.txt
            packages/output/*.tcz.info
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify package installation requirements
        run: |
          echo "Performing post-deployment verification..."
          EXIT_CODE=0

          for pkg in packages/output/*.tcz; do
            if [ -f "$pkg" ]; then
              PKG_NAME=$(basename "$pkg")
              echo "Verifying $PKG_NAME..."

              # Check if checksums match
              if [ -f "$pkg.md5.txt" ]; then
                cd packages/output
                if md5sum -c "${PKG_NAME}.md5.txt" >/dev/null 2>&1; then
                  echo "  ✓ Checksum verified"
                else
                  echo "  ✗ Checksum mismatch!"
                  EXIT_CODE=1
                fi
                cd - > /dev/null
              fi

              # Verify package is valid TCZ
              if unsquashfs -l "$pkg" >/dev/null 2>&1; then
                echo "  ✓ Valid TCZ package"
              else
                echo "  ✗ Invalid TCZ package!"
                EXIT_CODE=1
              fi
            fi
          done

          exit $EXIT_CODE

      - name: Deployment Summary
        if: always()
        run: |
          VERSION=${{ steps.new_version.outputs.version }}
          echo "# CD Pipeline Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA**: ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version: v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "**Result**: ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result**: ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version | Size | Checksum |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|------|----------|" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/output/*.tcz; do
            if [ -f "$pkg" ]; then
              PKG_NAME=$(basename "$pkg")
              PKG_SIZE=$(du -h "$pkg" | cut -f1)
              if [ -f "$pkg.md5.txt" ]; then
                PKG_MD5=$(cut -d' ' -f1 "$pkg.md5.txt")
                PKG_MD5_SHORT="${PKG_MD5:0:8}..."
              else
                PKG_MD5_SHORT="N/A"
              fi
              echo "| ${PKG_NAME} | ${VERSION} | ${PKG_SIZE} | ${PKG_MD5_SHORT} |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Targets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 **packagecloud.io**: [flossware/virtos](https://packagecloud.io/flossware/virtos)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ **GitHub Release**: [v${VERSION}](https://github.com/FlossWare/VirtOS/releases/tag/v${VERSION})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# On Tiny Core Linux / VirtOS" >> $GITHUB_STEP_SUMMARY
          echo "tce-load -wi virtos-tools" >> $GITHUB_STEP_SUMMARY
          echo "tce-load -wi virtos-jplatform" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify installation" >> $GITHUB_STEP_SUMMARY
          echo "virtos-tui --version" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Post-Deployment Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pre-deployment validation passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Package checksums verified" >> $GITHUB_STEP_SUMMARY
          echo "✅ TCZ format validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Version bumped successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub release created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Monitoring" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Monitor packagecloud.io for availability (~5-10 minutes)" >> $GITHUB_STEP_SUMMARY
          echo "2. Test package installation on VirtOS system" >> $GITHUB_STEP_SUMMARY
          echo "3. Run functional tests on deployed version" >> $GITHUB_STEP_SUMMARY
          echo "4. Check logs for any deployment issues" >> $GITHUB_STEP_SUMMARY

      - name: Deployment Notification
        if: failure()
        run: |
          echo "# ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required**: Review and fix the deployment pipeline." >> $GITHUB_STEP_SUMMARY
