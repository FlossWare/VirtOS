name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '**.md'

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint markdown files
        uses: articulate/actions-markdownlint@v1
        with:
          config: .markdownlint.json
          files: '**/*.md'
          ignore: node_modules
        continue-on-error: true

  doc-count:
    name: Documentation Statistics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Count documentation
        run: |
          echo "## Documentation Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count markdown files
          DOC_COUNT=$(find docs -name "*.md" 2>/dev/null | wc -l)
          DOC_COUNT=$((DOC_COUNT + $(find . -maxdepth 1 -name "*.md" -type f | wc -l)))
          echo "- Documentation files: $DOC_COUNT" >> $GITHUB_STEP_SUMMARY

          # Count total lines
          TOTAL_LINES=$(find docs -name "*.md" -exec cat {} \; 2>/dev/null | wc -l)
          TOTAL_LINES=$((TOTAL_LINES + $(find . -maxdepth 1 -name "*.md" -type f -exec cat {} \; | wc -l)))
          echo "- Total documentation lines: $TOTAL_LINES" >> $GITHUB_STEP_SUMMARY

          # Count scripts
          SCRIPT_COUNT=$(find config/custom-scripts -name "virtos-*" -type f 2>/dev/null | wc -l)
          echo "- Management scripts: $SCRIPT_COUNT" >> $GITHUB_STEP_SUMMARY

          # List all docs
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Documentation Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for doc in docs/*.md; do
            if [ -f "$doc" ]; then
              LINES=$(wc -l < "$doc")
              echo "- $(basename $doc): $LINES lines" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Root level docs
          for doc in *.md; do
            if [ -f "$doc" ] && [ "$doc" != "README.md" ]; then
              LINES=$(wc -l < "$doc")
              echo "- $(basename $doc): $LINES lines" >> $GITHUB_STEP_SUMMARY
            fi
          done

  check-broken-links:
    name: Check for Broken Internal Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate internal links in documentation
        run: |
          echo "Checking for broken internal links in documentation..."
          EXIT_CODE=0
          BROKEN_LINKS_FOUND=0

          # Check all markdown files for internal links
          for md_file in $(find . -name "*.md" -type f); do
            # Extract all [text](path) style links
            grep -o '\[.*\](.*\.md[^)]*)' "$md_file" | sed 's/.*(\(.*\))/\1/' | while read link; do
              # Skip http/https links
              if [[ "$link" =~ ^https?:// ]]; then
                continue
              fi

              # Skip anchor-only links
              if [[ "$link" =~ ^#.* ]]; then
                continue
              fi

              # Extract file path (before any #anchor)
              file_path="${link%%#*}"

              # Check if file exists
              if [ ! -z "$file_path" ] && [ ! -f "$file_path" ]; then
                echo "❌ Broken link in $md_file: $link (file not found: $file_path)"
                BROKEN_LINKS_FOUND=$((BROKEN_LINKS_FOUND + 1))
                EXIT_CODE=1
              fi
            done
          done

          if [ $BROKEN_LINKS_FOUND -eq 0 ]; then
            echo "✅ All internal links are valid"
          else
            echo "⚠️  Found $BROKEN_LINKS_FOUND broken internal link(s)"
          fi

          exit $EXIT_CODE

      - name: Validate code examples in documentation
        run: |
          echo "Validating code examples in documentation..."
          EXIT_CODE=0

          # Check for bash code blocks
          for md_file in $(find docs -name "*.md" -type f); do
            # Extract bash code blocks (between ```bash and ```)
            # This is a simple check - just verify they're not obviously broken

            # Look for unterminated code blocks
            BACKTICK_COUNT=$(grep -o '```' "$md_file" | wc -l)
            if [ $((BACKTICK_COUNT % 2)) -ne 0 ]; then
              echo "⚠️  Unterminated code block in $md_file"
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All code blocks appear valid"
          fi

          exit $EXIT_CODE

      - name: Check documentation completeness
        run: |
          echo "## Documentation Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required Documentation Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          MISSING_FILES=0
          REQUIRED_FILES=("README.md" "CONTRIBUTING.md" "LICENSE")

          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "- ✅ $file" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $file (MISSING)" >> $GITHUB_STEP_SUMMARY
              MISSING_FILES=$((MISSING_FILES + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Internal Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All internal links validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code blocks syntactically sound" >> $GITHUB_STEP_SUMMARY

          if [ $MISSING_FILES -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Documentation validation passed**" >> $GITHUB_STEP_SUMMARY
          fi
