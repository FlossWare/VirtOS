apiVersion: v1
kind: Container
metadata:
  name: nginx-test
  labels:
    app: nginx
    environment: integration
spec:
  image: nginx:latest
  ports:
    - containerPort: 80
      hostPort: 8080
  environment:
    - name: NGINX_HOST
      value: localhost
    - name: NGINX_PORT
      value: "80"
  resources:
    limits:
      memory: 256M
      cpu: 0.5
    requests:
      memory: 128M
      cpu: 0.25
