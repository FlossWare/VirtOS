# FlossWare VirtOS - Kernel Parameters
# /etc/sysctl.conf

# Enable IP forwarding for VM networking
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Bridge networking
net.bridge.bridge-nf-call-ip6tables = 0
net.bridge.bridge-nf-call-iptables = 0
net.bridge.bridge-nf-call-arptables = 0

# KVM performance tuning
# Increase max number of memory map areas for VMs
vm.max_map_count = 262144

# Overcommit settings (be cautious with these)
# vm.overcommit_memory = 1  # Always overcommit
# vm.overcommit_ratio = 80

# Swappiness (reduce swap usage)
vm.swappiness = 10

# Network performance
net.core.netdev_max_backlog = 5000
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Connection tracking for NAT
net.netfilter.nf_conntrack_max = 262144

# Container-specific settings
# Increase inotify limits for container runtimes
fs.inotify.max_user_instances = 512
fs.inotify.max_user_watches = 524288

# Increase PID limit
kernel.pid_max = 4194304

# Namespace limits
user.max_user_namespaces = 15000
user.max_net_namespaces = 15000
