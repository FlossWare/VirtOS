# VirtOS Cluster Configuration
# This file is deployed to /etc/virtos/cluster.conf on each node

#==============================================================================
# NODE IDENTITY
#==============================================================================

# Unique hostname for this node
# Set during boot or installation
NODE_HOSTNAME="virtos-1"

# Node role (optional, for organizational purposes)
# Values: compute, storage, mixed
NODE_ROLE="compute"

#==============================================================================
# CLUSTER MEMBERSHIP
#==============================================================================

# Cluster name - must match across all nodes
CLUSTER_NAME="homelab"

# Discovery method
# Values: avahi, multicast, static
DISCOVERY_METHOD="avahi"

# Broadcast settings (for multicast discovery)
BROADCAST_PORT="5900"
BROADCAST_INTERVAL="30"      # Seconds between announcements

#==============================================================================
# RESOURCE LIMITS
#==============================================================================

# Maximum VMs this node should run
# (0 = unlimited, based on available resources)
MAX_VMS="0"

# Reserved resources for host OS
RESERVED_RAM_MB="1024"       # RAM reserved for VirtOS host
RESERVED_CPU_PERCENT="10"    # CPU reserved for VirtOS host

#==============================================================================
# SHARED STORAGE (if enabled)
#==============================================================================

# NFS server for shared VM storage
NFS_SERVER=""                # Example: virtos-1.local
NFS_EXPORT_PATH=""           # Example: /mnt/sda1/vm-storage
NFS_MOUNT_POINT="/mnt/cluster-storage"

# Auto-mount shared storage at boot
AUTOMOUNT_SHARED_STORAGE="no"

#==============================================================================
# HIGH AVAILABILITY (future)
#==============================================================================

# Enable HA features
HA_ENABLED="no"

# Failover timeout (seconds)
HA_TIMEOUT="60"

# Health check interval (seconds)
HA_CHECK_INTERVAL="10"
