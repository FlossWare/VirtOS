# FlossWare VirtOS - Standard Profile
# Balanced for home lab and development (~200MB)

#==============================================================================
# VIRTUALIZATION
#==============================================================================
INCLUDE_KVM="yes"
INCLUDE_LXC="yes"
INCLUDE_DOCKER="yes"          # Primary container runtime
INCLUDE_CONTAINERD="yes"      # Alternative/minimal option
INCLUDE_PODMAN="yes"          # Security-focused option

#==============================================================================
# MANAGEMENT
#==============================================================================
INCLUDE_LIBVIRT="yes"         # Unified management
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"          # Can add later
INCLUDE_PORTAINER="no"        # Can add later

#==============================================================================
# NETWORKING
#==============================================================================
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

#==============================================================================
# STORAGE
#==============================================================================
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

#==============================================================================
# UTILITIES
#==============================================================================
INCLUDE_BASH="yes"            # More familiar shell
INCLUDE_VIM="yes"
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"
