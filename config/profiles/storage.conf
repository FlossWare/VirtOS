# VirtOS Storage Profile
# Optimized for advanced storage features and management
# Size: ~350MB | RAM: 4GB+ recommended

# Base system
TC_VERSION="15.x"
TC_ARCH="x86_64"
ISO_LABEL="VirtOS-Storage"
FW_VERSION="0.1-alpha"

# Virtualization - KVM only (storage-focused)
INCLUDE_KVM="yes"
INCLUDE_LXC="no"

# Containers - containerd only (minimal)
INCLUDE_DOCKER="no"
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="no"

# Management
INCLUDE_LIBVIRT="yes"
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

# Networking
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

# STORAGE - All advanced features enabled
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="yes"          # Logical Volume Manager
INCLUDE_ZFS="yes"          # ZFS filesystem
INCLUDE_BTRFS="yes"        # Btrfs filesystem

# System utilities
INCLUDE_BASH="yes"
INCLUDE_VIM="yes"
INCLUDE_NANO="yes"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"

# Boot options
AUTOSTART_NETWORKING="yes"
AUTOSTART_KVM="yes"
AUTOSTART_DOCKER="no"
AUTOSTART_LIBVIRT="yes"
BOOT_TIMEOUT="5"
ENABLE_SERIAL_CONSOLE="no"

# Customization
HOSTNAME="virtos-storage"
INCLUDE_CUSTOM_SCRIPTS="yes"
EXTRA_MODULES=""
EXTRA_BOOT_PARAMS=""

# Clustering
ENABLE_CLUSTERING="yes"
INCLUDE_AVAHI="yes"
CLUSTER_NAME="homelab"
CLUSTER_SHARED_STORAGE="yes"  # NFS enabled
CLUSTER_VM_MIGRATION="no"
CLUSTER_HA="no"

# Kubernetes - Disabled (storage focus)
INCLUDE_K3S="no"

# IaaS - Enabled
ENABLE_IAAS="yes"
IAAS_SCHEDULER="balanced"
IAAS_REFRESH_INTERVAL="30"
IAAS_CPU_OVERCOMMIT="1.0"
IAAS_RAM_OVERCOMMIT="1.0"
IAAS_MIN_FREE_RAM_MB="2048"  # Higher for ZFS
IAAS_AVOID_SINGLE_NODE="yes"

# Build options
COMPRESSION_LEVEL="9"
CREATE_HYBRID_ISO="yes"
GENERATE_CHECKSUMS="yes"
CLEAN_AFTER_BUILD="no"
