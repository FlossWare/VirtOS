# FlossWare VirtOS - Kubernetes Profile
# Optimized for K3s container orchestration across cluster (~250MB)

#==============================================================================
# VIRTUALIZATION
#==============================================================================
INCLUDE_KVM="yes"            # Available but not primary focus
INCLUDE_LXC="yes"
INCLUDE_DOCKER="yes"
INCLUDE_CONTAINERD="yes"     # K3s uses containerd
INCLUDE_PODMAN="yes"

#==============================================================================
# MANAGEMENT
#==============================================================================
INCLUDE_LIBVIRT="no"         # Not needed for K3s
INCLUDE_VIRSH="no"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

#==============================================================================
# NETWORKING
#==============================================================================
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="yes"      # Useful for K3s WireGuard backend

#==============================================================================
# STORAGE
#==============================================================================
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

#==============================================================================
# UTILITIES
#==============================================================================
INCLUDE_BASH="yes"
INCLUDE_VIM="yes"
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"

#==============================================================================
# CLUSTERING
#==============================================================================
ENABLE_CLUSTERING="yes"      # Essential for K3s multi-node
INCLUDE_AVAHI="yes"

#==============================================================================
# KUBERNETES
#==============================================================================
INCLUDE_K3S="yes"            # Enable K3s
K3S_VERSION="latest"
K3S_ROLE="both"              # Can be server or agent
AUTOSTART_K3S="no"           # Manual start recommended
