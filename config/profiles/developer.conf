# FlossWare VirtOS - Developer Profile
# Developer-friendly with all container runtimes (~250MB)

#==============================================================================
# VIRTUALIZATION
#==============================================================================
INCLUDE_KVM="yes"
INCLUDE_LXC="yes"
INCLUDE_DOCKER="yes"          # All three for learning/testing
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="yes"

#==============================================================================
# MANAGEMENT
#==============================================================================
INCLUDE_LIBVIRT="yes"
INCLUDE_VIRSH="yes"
INCLUDE_COCKPIT="no"          # Can add later if needed
INCLUDE_PORTAINER="yes"       # Useful for container dev

#==============================================================================
# NETWORKING
#==============================================================================
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="yes"       # For secure remote dev

#==============================================================================
# STORAGE
#==============================================================================
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

#==============================================================================
# UTILITIES
#==============================================================================
INCLUDE_BASH="yes"            # Essential for dev
INCLUDE_VIM="yes"
INCLUDE_NANO="yes"            # Both editors
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"
