# FlossWare VirtOS - Container-Focused Profile
# Optimized for container workloads (~150MB)

#==============================================================================
# VIRTUALIZATION
#==============================================================================
INCLUDE_KVM="yes"             # Minimal KVM for testing
INCLUDE_LXC="yes"
INCLUDE_DOCKER="yes"
INCLUDE_CONTAINERD="yes"
INCLUDE_PODMAN="yes"

#==============================================================================
# MANAGEMENT
#==============================================================================
INCLUDE_LIBVIRT="no"          # Not needed for containers
INCLUDE_VIRSH="no"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="yes"       # Container-specific UI

#==============================================================================
# NETWORKING
#==============================================================================
INCLUDE_BRIDGE_UTILS="yes"
INCLUDE_IPTABLES="yes"
INCLUDE_DNSMASQ="yes"
INCLUDE_OVS="yes"             # Advanced container networking
INCLUDE_WIREGUARD="no"

#==============================================================================
# STORAGE
#==============================================================================
INCLUDE_QEMU_IMG="yes"
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

#==============================================================================
# UTILITIES
#==============================================================================
INCLUDE_BASH="yes"
INCLUDE_VIM="yes"
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"
INCLUDE_HTOP="yes"
INCLUDE_CURL="yes"
INCLUDE_WGET="yes"
