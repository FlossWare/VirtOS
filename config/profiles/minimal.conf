# FlossWare VirtOS - Minimal Profile
# Smallest possible functional system (~100MB)

#==============================================================================
# VIRTUALIZATION
#==============================================================================
INCLUDE_KVM="yes"
INCLUDE_LXC="no"
INCLUDE_DOCKER="no"
INCLUDE_CONTAINERD="yes"      # Smallest container runtime
INCLUDE_PODMAN="no"

#==============================================================================
# MANAGEMENT
#==============================================================================
INCLUDE_LIBVIRT="no"          # Use direct QEMU commands
INCLUDE_VIRSH="no"
INCLUDE_COCKPIT="no"
INCLUDE_PORTAINER="no"

#==============================================================================
# NETWORKING
#==============================================================================
INCLUDE_BRIDGE_UTILS="yes"    # Essential
INCLUDE_IPTABLES="yes"        # Essential
INCLUDE_DNSMASQ="no"          # Can add later if needed
INCLUDE_OVS="no"
INCLUDE_WIREGUARD="no"

#==============================================================================
# STORAGE
#==============================================================================
INCLUDE_QEMU_IMG="yes"        # Essential for KVM
INCLUDE_LVM="no"
INCLUDE_ZFS="no"
INCLUDE_BTRFS="no"

#==============================================================================
# UTILITIES
#==============================================================================
INCLUDE_BASH="no"             # Use busybox ash
INCLUDE_VIM="no"              # Use vi
INCLUDE_NANO="no"
INCLUDE_OPENSSH="yes"         # For remote access
INCLUDE_HTOP="no"
INCLUDE_CURL="no"
INCLUDE_WGET="yes"            # For downloading extensions
