#!/bin/bash
# VirtOS Path Configuration
# Copyright (c) 2026 FlossWare
# Licensed under the GNU General Public License v3.0
#
# This file defines all system paths used by VirtOS scripts as environment variables.
# Each path has a default value that can be overridden by setting the environment variable.
#
# Usage:
#   # In your script:
#   . /usr/local/lib/virtos-common.sh
#   ssh_config=$(get_virtos_path SSH_CONFIG)
#
#   # Or override before running:
#   export VIRTOS_SSH_CONFIG=/custom/path/sshd_config
#   virtos-cluster join node1
#
# Format: VIRTOS_<CATEGORY>_<NAME>="${VIRTOS_<CATEGORY>_<NAME>:-/default/path}"

#==============================================================================
# System Configuration Paths
#==============================================================================

# SSH Configuration
VIRTOS_SSH_CONFIG="${VIRTOS_SSH_CONFIG:-/etc/ssh/sshd_config}"
VIRTOS_SSH_AUTHORIZED_KEYS="${VIRTOS_SSH_AUTHORIZED_KEYS:-/root/.ssh/authorized_keys}"
VIRTOS_SSH_KNOWN_HOSTS="${VIRTOS_SSH_KNOWN_HOSTS:-/root/.ssh/known_hosts}"

# VirtOS Base Directories
VIRTOS_ETC_DIR="${VIRTOS_ETC_DIR:-/etc/virtos}"
VIRTOS_LIB_DIR="${VIRTOS_LIB_DIR:-/var/lib/virtos}"
VIRTOS_LOG_DIR="${VIRTOS_LOG_DIR:-/var/log}"
VIRTOS_BACKUP_DIR="${VIRTOS_BACKUP_DIR:-/var/backups}"
VIRTOS_SHARE_DIR="${VIRTOS_SHARE_DIR:-/usr/local/share/virtos}"
VIRTOS_BIN_DIR="${VIRTOS_BIN_DIR:-/usr/local/bin}"

# Version Information
VIRTOS_VERSION_FILE="${VIRTOS_VERSION_FILE:-/usr/local/share/virtos/VERSION}"
VIRTOS_VERSION_ETC="${VIRTOS_VERSION_ETC:-/etc/virtos/VERSION}"
VIRTOS_VERSION_SYSTEM="${VIRTOS_VERSION_SYSTEM:-/etc/virtos/version.txt}"

#==============================================================================
# Cluster Management Paths
#==============================================================================

# Cluster Configuration
VIRTOS_CLUSTER_CONF="${VIRTOS_CLUSTER_CONF:-/etc/virtos/cluster.conf}"
VIRTOS_CLUSTER_MEMBERS="${VIRTOS_CLUSTER_MEMBERS:-/etc/virtos/cluster-members.conf}"
VIRTOS_CLUSTER_KNOWN_HOSTS="${VIRTOS_CLUSTER_KNOWN_HOSTS:-/etc/virtos/cluster-known_hosts}"

# Avahi/mDNS Service Discovery
VIRTOS_AVAHI_SERVICES="${VIRTOS_AVAHI_SERVICES:-/etc/avahi/services}"
VIRTOS_AVAHI_VIRTOS_SERVICE="${VIRTOS_AVAHI_VIRTOS_SERVICE:-/etc/avahi/services/virtos.service}"

#==============================================================================
# Storage and Backup Paths
#==============================================================================

# Storage Pools
VIRTOS_STORAGE_POOL_DEFAULT="${VIRTOS_STORAGE_POOL_DEFAULT:-/var/lib/libvirt/images}"
VIRTOS_STORAGE_ISO="${VIRTOS_STORAGE_ISO:-/var/lib/libvirt/iso}"
VIRTOS_STORAGE_TEMPLATES="${VIRTOS_STORAGE_TEMPLATES:-/var/lib/libvirt/templates}"

# Backup Orchestration
VIRTOS_BACKUP_ORCHESTRATED="${VIRTOS_BACKUP_ORCHESTRATED:-/var/backups/orchestrated}"
VIRTOS_BACKUP_RETENTION_CONF="${VIRTOS_BACKUP_RETENTION_CONF:-/etc/virtos/backup-orchestration/retention.conf}"

#==============================================================================
# Logging Paths
#==============================================================================

# Core Component Logs
VIRTOS_LOG_MONITOR="${VIRTOS_LOG_MONITOR:-/var/log/virtos-monitor.log}"
VIRTOS_LOG_NETWORK="${VIRTOS_LOG_NETWORK:-/var/log/virtos-network.log}"
VIRTOS_LOG_STORAGE="${VIRTOS_LOG_STORAGE:-/var/log/virtos-storage.log}"
VIRTOS_LOG_API="${VIRTOS_LOG_API:-/var/log/virtos-api.log}"

# Infrastructure Logs
VIRTOS_LOG_AUTH="${VIRTOS_LOG_AUTH:-/var/log/virtos-auth.log}"
VIRTOS_LOG_DATABASE="${VIRTOS_LOG_DATABASE:-/var/log/virtos-database.log}"
VIRTOS_LOG_DIRECTORY="${VIRTOS_LOG_DIRECTORY:-/var/log/virtos-directory.log}"
VIRTOS_LOG_SECRETS="${VIRTOS_LOG_SECRETS:-/var/log/virtos-secrets.log}"
VIRTOS_LOG_UPDATE="${VIRTOS_LOG_UPDATE:-/var/log/virtos-update.log}"

# Advanced Feature Logs
VIRTOS_LOG_ANALYTICS="${VIRTOS_LOG_ANALYTICS:-/var/log/virtos-analytics.log}"
VIRTOS_LOG_AUTOMATION="${VIRTOS_LOG_AUTOMATION:-/var/log/virtos-automation.log}"
VIRTOS_LOG_AUTOMATION_SECURITY="${VIRTOS_LOG_AUTOMATION_SECURITY:-/var/log/virtos-automation-security.log}"
VIRTOS_LOG_BACKUP_ORCHESTRATION="${VIRTOS_LOG_BACKUP_ORCHESTRATION:-/var/log/virtos-backup-orchestration.log}"
VIRTOS_LOG_BILLING="${VIRTOS_LOG_BILLING:-/var/log/virtos-billing.log}"
VIRTOS_LOG_CONTAINER_SECURITY="${VIRTOS_LOG_CONTAINER_SECURITY:-/var/log/virtos-container-security.log}"
VIRTOS_LOG_DATACENTER="${VIRTOS_LOG_DATACENTER:-/var/log/virtos-datacenter.log}"
VIRTOS_LOG_DEVOPS="${VIRTOS_LOG_DEVOPS:-/var/log/virtos-devops.log}"
VIRTOS_LOG_DR="${VIRTOS_LOG_DR:-/var/log/virtos-dr.log}"
VIRTOS_LOG_DR_ADVANCED="${VIRTOS_LOG_DR_ADVANCED:-/var/log/virtos-dr-advanced.log}"
VIRTOS_LOG_GPU="${VIRTOS_LOG_GPU:-/var/log/virtos-gpu.log}"
VIRTOS_LOG_HA="${VIRTOS_LOG_HA:-/var/log/virtos-ha.log}"
VIRTOS_LOG_NETWORKING_ADVANCED="${VIRTOS_LOG_NETWORKING_ADVANCED:-/var/log/virtos-networking-advanced.log}"
VIRTOS_LOG_OBSERVABILITY="${VIRTOS_LOG_OBSERVABILITY:-/var/log/virtos-observability.log}"
VIRTOS_LOG_PERFORMANCE="${VIRTOS_LOG_PERFORMANCE:-/var/log/virtos-performance.log}"
VIRTOS_LOG_SECURITY="${VIRTOS_LOG_SECURITY:-/var/log/virtos-security.log}"
VIRTOS_LOG_SECURITY_ADVANCED="${VIRTOS_LOG_SECURITY_ADVANCED:-/var/log/virtos-security-advanced.log}"
VIRTOS_LOG_TELEMETRY="${VIRTOS_LOG_TELEMETRY:-/var/log/virtos-telemetry.log}"
VIRTOS_LOG_USB="${VIRTOS_LOG_USB:-/var/log/virtos-usb.log}"
VIRTOS_LOG_WEB="${VIRTOS_LOG_WEB:-/var/log/virtos-web.log}"

# Security Audit Logs
VIRTOS_LOG_SECURITY_AUDITS="${VIRTOS_LOG_SECURITY_AUDITS:-/var/log/virtos/security-audits}"

#==============================================================================
# Configuration Files (Component-Specific)
#==============================================================================

# Analytics and Monitoring
VIRTOS_CONF_ANALYTICS="${VIRTOS_CONF_ANALYTICS:-/etc/virtos/analytics.conf}"
VIRTOS_CONF_OBSERVABILITY="${VIRTOS_CONF_OBSERVABILITY:-/etc/virtos/observability.conf}"
VIRTOS_CONF_PERFORMANCE="${VIRTOS_CONF_PERFORMANCE:-/etc/virtos/performance.conf}"

# Automation and DevOps
VIRTOS_CONF_AUTOMATION="${VIRTOS_CONF_AUTOMATION:-/etc/virtos/automation.conf}"

# Billing and Quota
VIRTOS_CONF_BILLING="${VIRTOS_CONF_BILLING:-/etc/virtos/billing.conf}"
VIRTOS_CONF_PRICING="${VIRTOS_CONF_PRICING:-/etc/virtos/pricing.conf}"

# Datacenter
VIRTOS_CONF_DATACENTER="${VIRTOS_CONF_DATACENTER:-/etc/virtos/datacenter.conf}"

# Disaster Recovery
VIRTOS_CONF_DR_ADVANCED="${VIRTOS_CONF_DR_ADVANCED:-/etc/virtos/dr-advanced.conf}"

# Security
VIRTOS_CONF_SECURITY="${VIRTOS_CONF_SECURITY:-/etc/virtos/security.conf}"
VIRTOS_CONF_SECURITY_ADVANCED="${VIRTOS_CONF_SECURITY_ADVANCED:-/etc/virtos/security-advanced.conf}"

#==============================================================================
# Data Directories (Component-Specific)
#==============================================================================

# Analytics
VIRTOS_DATA_ANALYTICS="${VIRTOS_DATA_ANALYTICS:-/var/lib/virtos/analytics}"

# Automation
VIRTOS_DATA_AUTOMATION="${VIRTOS_DATA_AUTOMATION:-/var/lib/virtos/automation}"

# Billing
VIRTOS_DATA_BILLING="${VIRTOS_DATA_BILLING:-/var/lib/virtos/billing}"
VIRTOS_DATA_INVOICES="${VIRTOS_DATA_INVOICES:-/var/lib/virtos/invoices}"

# Cloud-init
VIRTOS_DATA_CLOUD_INIT="${VIRTOS_DATA_CLOUD_INIT:-/var/lib/virtos/cloud-init}"

# Datacenter
VIRTOS_DATA_DATACENTERS="${VIRTOS_DATA_DATACENTERS:-/var/lib/virtos/datacenters}"

# Disaster Recovery
VIRTOS_DATA_DR="${VIRTOS_DATA_DR:-/var/lib/virtos/dr}"
VIRTOS_DATA_DR_BACKUPS="${VIRTOS_DATA_DR_BACKUPS:-/var/lib/virtos/dr/backups}"
VIRTOS_DATA_DR_ADVANCED="${VIRTOS_DATA_DR_ADVANCED:-/var/lib/virtos/dr-advanced}"
VIRTOS_DATA_DR_ADVANCED_SNAPSHOTS="${VIRTOS_DATA_DR_ADVANCED_SNAPSHOTS:-/var/lib/virtos/dr-advanced/snapshots}"
VIRTOS_DATA_DR_ADVANCED_REPLICATION="${VIRTOS_DATA_DR_ADVANCED_REPLICATION:-/var/lib/virtos/dr-advanced/replication}"

# GPU Management
VIRTOS_DATA_GPU="${VIRTOS_DATA_GPU:-/var/lib/virtos/gpu}"

# Network Management
VIRTOS_DATA_NETWORK="${VIRTOS_DATA_NETWORK:-/var/lib/virtos/network}"

# Observability
VIRTOS_DATA_OBSERVABILITY="${VIRTOS_DATA_OBSERVABILITY:-/var/lib/virtos/observability}"
VIRTOS_DATA_OBSERVABILITY_METRICS="${VIRTOS_DATA_OBSERVABILITY_METRICS:-/var/lib/virtos/observability/metrics}"
VIRTOS_DATA_OBSERVABILITY_TRACES="${VIRTOS_DATA_OBSERVABILITY_TRACES:-/var/lib/virtos/observability/traces}"

# Performance Testing
VIRTOS_DATA_PERFORMANCE="${VIRTOS_DATA_PERFORMANCE:-/var/lib/virtos/performance}"
VIRTOS_DATA_PERFORMANCE_BENCHMARKS="${VIRTOS_DATA_PERFORMANCE_BENCHMARKS:-/var/lib/virtos/performance/benchmarks}"

#==============================================================================
# Cron Job Paths
#==============================================================================

# Scheduled Task Definitions
VIRTOS_CRON_DIR="${VIRTOS_CRON_DIR:-/etc/cron.d}"
VIRTOS_CRON_UPDATE="${VIRTOS_CRON_UPDATE:-/etc/cron.d/virtos-update}"
VIRTOS_CRON_BACKUP_CLEANUP="${VIRTOS_CRON_BACKUP_CLEANUP:-/etc/cron.d/virtos-backup-cleanup}"

#==============================================================================
# Third-Party Integration Paths
#==============================================================================

# Docker/Container Paths
VIRTOS_DOCKER_COMPOSE="${VIRTOS_DOCKER_COMPOSE:-/usr/local/bin/docker-compose}"
VIRTOS_CONTAINERD_SOCK="${VIRTOS_CONTAINERD_SOCK:-/run/containerd/containerd.sock}"

# NFS Exports
VIRTOS_NFS_EXPORTS_DIR="${VIRTOS_NFS_EXPORTS_DIR:-/etc/exports.d}"

# AppArmor Security Profiles
VIRTOS_APPARMOR_DIR="${VIRTOS_APPARMOR_DIR:-/etc/apparmor.d}"

# Systemd Service Templates
VIRTOS_SYSTEMD_DIR="${VIRTOS_SYSTEMD_DIR:-/etc/systemd/system}"

# GlusterFS Volumes
VIRTOS_GLUSTERFS_DIR="${VIRTOS_GLUSTERFS_DIR:-/var/lib/glusterfs}"

# Consul Service Discovery
VIRTOS_CONSUL_DATA="${VIRTOS_CONSUL_DATA:-/var/lib/consul}"

# Vault Secrets Management
VIRTOS_VAULT_DATA="${VIRTOS_VAULT_DATA:-/var/lib/vault/data}"

#==============================================================================
# Configuration Subdirectories (Multi-Tenant/Multi-Component)
#==============================================================================

# Authentication
VIRTOS_CONF_AUTH_DIR="${VIRTOS_CONF_AUTH_DIR:-/etc/virtos/auth}"

# Backup Orchestration
VIRTOS_CONF_BACKUP_ORCHESTRATION_DIR="${VIRTOS_CONF_BACKUP_ORCHESTRATION_DIR:-/etc/virtos/backup-orchestration}"

# Container Security
VIRTOS_CONF_CONTAINER_SECURITY_DIR="${VIRTOS_CONF_CONTAINER_SECURITY_DIR:-/etc/virtos/container-security}"

# Database
VIRTOS_CONF_DATABASE_DIR="${VIRTOS_CONF_DATABASE_DIR:-/etc/virtos/database}"

# DevOps
VIRTOS_CONF_DEVOPS_DIR="${VIRTOS_CONF_DEVOPS_DIR:-/etc/virtos/devops}"

# Directory Services
VIRTOS_CONF_DIRECTORY_DIR="${VIRTOS_CONF_DIRECTORY_DIR:-/etc/virtos/directory}"

# High Availability
VIRTOS_CONF_HA_DIR="${VIRTOS_CONF_HA_DIR:-/etc/virtos/ha}"

# Monitoring
VIRTOS_CONF_MONITOR_DIR="${VIRTOS_CONF_MONITOR_DIR:-/etc/virtos/monitor}"

# Advanced Networking
VIRTOS_CONF_NETWORKING_ADVANCED_DIR="${VIRTOS_CONF_NETWORKING_ADVANCED_DIR:-/etc/virtos/networking-advanced}"

# Quota Management
VIRTOS_CONF_QUOTA_DIR="${VIRTOS_CONF_QUOTA_DIR:-/etc/virtos/quota}"

# Secrets Management
VIRTOS_CONF_SECRETS_DIR="${VIRTOS_CONF_SECRETS_DIR:-/etc/virtos/secrets}"

# Security Policies
VIRTOS_CONF_SECURITY_POLICIES_DIR="${VIRTOS_CONF_SECURITY_POLICIES_DIR:-/etc/virtos/security-policies}"

# Web Management
VIRTOS_CONF_WEB_DIR="${VIRTOS_CONF_WEB_DIR:-/etc/virtos/web}"

#==============================================================================
# Export all variables for use in subshells
#==============================================================================

# Export configuration for other scripts to use
export VIRTOS_SSH_CONFIG VIRTOS_SSH_AUTHORIZED_KEYS VIRTOS_SSH_KNOWN_HOSTS
export VIRTOS_ETC_DIR VIRTOS_LIB_DIR VIRTOS_LOG_DIR VIRTOS_BACKUP_DIR
export VIRTOS_SHARE_DIR VIRTOS_BIN_DIR
export VIRTOS_VERSION_FILE VIRTOS_VERSION_ETC VIRTOS_VERSION_SYSTEM
export VIRTOS_CLUSTER_CONF VIRTOS_CLUSTER_MEMBERS VIRTOS_CLUSTER_KNOWN_HOSTS
export VIRTOS_AVAHI_SERVICES VIRTOS_AVAHI_VIRTOS_SERVICE
export VIRTOS_STORAGE_POOL_DEFAULT VIRTOS_STORAGE_ISO VIRTOS_STORAGE_TEMPLATES
export VIRTOS_BACKUP_ORCHESTRATED VIRTOS_BACKUP_RETENTION_CONF
export VIRTOS_DOCKER_COMPOSE VIRTOS_CONTAINERD_SOCK
export VIRTOS_NFS_EXPORTS_DIR VIRTOS_APPARMOR_DIR VIRTOS_SYSTEMD_DIR
export VIRTOS_GLUSTERFS_DIR VIRTOS_CONSUL_DATA VIRTOS_VAULT_DATA
export VIRTOS_CRON_DIR VIRTOS_CRON_UPDATE VIRTOS_CRON_BACKUP_CLEANUP

# Export all log paths
export VIRTOS_LOG_MONITOR VIRTOS_LOG_NETWORK VIRTOS_LOG_STORAGE VIRTOS_LOG_API
export VIRTOS_LOG_AUTH VIRTOS_LOG_DATABASE VIRTOS_LOG_DIRECTORY VIRTOS_LOG_SECRETS VIRTOS_LOG_UPDATE
export VIRTOS_LOG_ANALYTICS
export VIRTOS_LOG_AUTOMATION VIRTOS_LOG_AUTOMATION_SECURITY
export VIRTOS_LOG_BACKUP_ORCHESTRATION VIRTOS_LOG_BILLING
export VIRTOS_LOG_CONTAINER_SECURITY VIRTOS_LOG_DATACENTER VIRTOS_LOG_DEVOPS
export VIRTOS_LOG_DR VIRTOS_LOG_DR_ADVANCED
export VIRTOS_LOG_GPU VIRTOS_LOG_HA
export VIRTOS_LOG_NETWORKING_ADVANCED VIRTOS_LOG_OBSERVABILITY VIRTOS_LOG_PERFORMANCE
export VIRTOS_LOG_SECURITY VIRTOS_LOG_SECURITY_ADVANCED VIRTOS_LOG_SECURITY_AUDITS
export VIRTOS_LOG_TELEMETRY VIRTOS_LOG_USB VIRTOS_LOG_WEB

# Export all configuration paths
export VIRTOS_CONF_ANALYTICS VIRTOS_CONF_OBSERVABILITY VIRTOS_CONF_PERFORMANCE
export VIRTOS_CONF_AUTOMATION VIRTOS_CONF_BILLING VIRTOS_CONF_PRICING
export VIRTOS_CONF_DATACENTER VIRTOS_CONF_DR_ADVANCED
export VIRTOS_CONF_SECURITY VIRTOS_CONF_SECURITY_ADVANCED

# Export all data directories
export VIRTOS_DATA_ANALYTICS VIRTOS_DATA_AUTOMATION VIRTOS_DATA_BILLING VIRTOS_DATA_INVOICES
export VIRTOS_DATA_CLOUD_INIT VIRTOS_DATA_DATACENTERS
export VIRTOS_DATA_DR VIRTOS_DATA_DR_BACKUPS VIRTOS_DATA_DR_ADVANCED
export VIRTOS_DATA_DR_ADVANCED_SNAPSHOTS VIRTOS_DATA_DR_ADVANCED_REPLICATION
export VIRTOS_DATA_GPU VIRTOS_DATA_NETWORK
export VIRTOS_DATA_OBSERVABILITY VIRTOS_DATA_OBSERVABILITY_METRICS VIRTOS_DATA_OBSERVABILITY_TRACES
export VIRTOS_DATA_PERFORMANCE VIRTOS_DATA_PERFORMANCE_BENCHMARKS

# Export all configuration subdirectories
export VIRTOS_CONF_AUTH_DIR VIRTOS_CONF_BACKUP_ORCHESTRATION_DIR
export VIRTOS_CONF_CONTAINER_SECURITY_DIR VIRTOS_CONF_DATABASE_DIR VIRTOS_CONF_DEVOPS_DIR
export VIRTOS_CONF_DIRECTORY_DIR VIRTOS_CONF_HA_DIR
export VIRTOS_CONF_MONITOR_DIR VIRTOS_CONF_NETWORKING_ADVANCED_DIR
export VIRTOS_CONF_QUOTA_DIR VIRTOS_CONF_SECRETS_DIR VIRTOS_CONF_SECURITY_POLICIES_DIR
export VIRTOS_CONF_WEB_DIR
